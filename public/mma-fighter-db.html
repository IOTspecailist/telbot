<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fighter DB</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height:100%;
  overflow:hidden;
}
body {
  background:#f2ede4;
  color:#1a1a1a;
  font-family:'Barlow Condensed',sans-serif;
  padding:10px 16px 10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  height:100vh;
  overflow:hidden;
}

/* ─── 상단 바 ─── */
.top-bar {
  width:100%;
  max-width:860px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-shrink:0;
}
.top-bar h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;
  color:#1a1a1a;
  letter-spacing:4px;
}

/* ─── 검색 패널 ─── */
.search-panel {
  width:100%;
  max-width:860px;
  background:#fff;
  border:1px solid rgba(212,0,26,0.15);
  border-left:3px solid #d4001a;
  border-radius:4px;
  padding:10px 14px;
  display:flex;
  align-items:center;
  gap:8px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
  flex-shrink:0;
}
.search-label {
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;
  color:#d4001a;
  letter-spacing:2px;
  white-space:nowrap;
}
input[type=text] {
  flex:1;
  background:#fafafa;
  border:1px solid rgba(0,0,0,0.13);
  border-radius:3px;
  color:#1a1a1a;
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;
  letter-spacing:2px;
  padding:6px 10px;
  outline:none;
  min-width:0;
}
input[type=text]:focus { border-color:#d4001a; }

/* ─── 버튼 ─── */
.btn {
  padding:7px 16px;
  background:#d4001a;
  border:none;
  border-radius:3px;
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;
  letter-spacing:2px;
  color:#fff;
  cursor:pointer;
  white-space:nowrap;
}
.btn:hover { background:#b8001a; }
.btn:disabled { background:#ccc; cursor:default; }
.btn-outline {
  padding:5px 10px;
  background:#fff;
  border:1px solid rgba(0,0,0,0.18);
  border-radius:3px;
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;
  letter-spacing:1.5px;
  color:#555;
  cursor:pointer;
  white-space:nowrap;
  text-decoration:none;
  display:inline-block;
}
.btn-outline:hover { border-color:#d4001a; color:#d4001a; }
.btn-save {
  width:100%;
  padding:10px;
  background:#1a6b1a;
  border:none;
  border-radius:3px;
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;
  letter-spacing:3px;
  color:#fff;
  cursor:pointer;
  margin-top:4px;
}
.btn-save:hover { background:#155515; }
.btn-save:disabled { background:#ccc; cursor:default; }

/* ─── 상태 메시지 ─── */
.status {
  width:100%;
  max-width:860px;
  padding:7px 12px;
  font-size:12px;
  font-weight:700;
  letter-spacing:1px;
  border-radius:3px;
  display:none;
  flex-shrink:0;
}
.status.ok  { background:rgba(26,107,26,0.08); border:1px solid rgba(26,107,26,0.3); color:#1a6b1a; }
.status.err { background:rgba(212,0,26,0.07); border:1px solid rgba(212,0,26,0.3); color:#d4001a; }

/* ─── 2열 메인 그리드 ─── */
.main-grid {
  width:100%;
  max-width:860px;
  display:grid;
  grid-template-columns:220px 1fr;
  gap:10px;
  flex:1;          /* body 남은 높이 전부 차지 */
  min-height:0;    /* flex shrink 허용 */
  overflow:hidden;
}

/* ─── 선수 목록 (왼쪽) ─── */
.fighter-col {
  display:flex;
  flex-direction:column;
  gap:6px;
  height:100%;
  overflow:hidden;
  min-height:0;
}
.col-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 2px;
}
.col-header-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;
  color:#d4001a;
  letter-spacing:2.5px;
}
.col-header-actions { display:flex; gap:4px; }
.fighter-list-body {
  display:flex;
  flex-direction:column;
  gap:3px;
  flex:1;
  overflow-y:auto;
  min-height:0;
  /* 스크롤바 스타일 */
  scrollbar-width:thin;
  scrollbar-color:rgba(212,0,26,0.3) transparent;
}
.fighter-list-body::-webkit-scrollbar { width:4px; }
.fighter-list-body::-webkit-scrollbar-track { background:transparent; }
.fighter-list-body::-webkit-scrollbar-thumb { background:rgba(212,0,26,0.3); border-radius:2px; }
.fighter-row {
  background:#fff;
  border:1px solid rgba(0,0,0,0.08);
  border-left:2px solid transparent;
  border-radius:3px;
  padding:5px 8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  transition:border-color 0.12s;
}
.fighter-row:hover { border-color:#d4001a; }
.fighter-row.active {
  border-color:#d4001a;
  border-left-color:#d4001a;
  background:rgba(212,0,26,0.03);
}
.fighter-row .fname {
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;
  letter-spacing:0.5px;
  line-height:1.2;
}
.fighter-row .fmeta {
  color:#999;
  font-size:10px;
  line-height:1.2;
}
.btn-del {
  padding:3px 7px;
  background:#fff;
  border:1px solid rgba(212,0,26,0.25);
  border-radius:2px;
  font-family:'Bebas Neue',sans-serif;
  font-size:10px;
  letter-spacing:1px;
  color:#d4001a;
  cursor:pointer;
  flex-shrink:0;
}
.btn-del:hover { background:#d4001a; color:#fff; }

/* ─── 스탯 패널 (오른쪽) ─── */
.stat-col {
  display:flex;
  flex-direction:column;
  gap:6px;
  height:100%;
  overflow-y:auto;
  min-height:0;
  scrollbar-width:thin;
  scrollbar-color:rgba(212,0,26,0.3) transparent;
}
.stat-col::-webkit-scrollbar { width:4px; }
.stat-col::-webkit-scrollbar-track { background:transparent; }
.stat-col::-webkit-scrollbar-thumb { background:rgba(212,0,26,0.3); border-radius:2px; }
.stat-panel {
  background:#fff;
  border:1px solid rgba(212,0,26,0.12);
  border-left:3px solid #d4001a;
  border-radius:4px;
  padding:10px 12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
  display:none;
  flex-direction:column;
  gap:6px;
}
.stat-panel-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:16px;
  letter-spacing:2px;
  color:#1a1a1a;
  border-bottom:1px solid rgba(212,0,26,0.2);
  padding-bottom:5px;
}
.stat-panel-name span {
  font-size:11px;
  color:#999;
  letter-spacing:1px;
  font-weight:400;
  margin-left:6px;
}

/* 스탯 2×2 그리드 */
.stats-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}
.stat-block {
  background:#fafafa;
  border:1px solid rgba(0,0,0,0.06);
  border-radius:3px;
  padding:7px 8px;
}
.stat-block-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:10px;
  color:#d4001a;
  letter-spacing:2.5px;
  margin-bottom:5px;
  border-bottom:1px solid rgba(212,0,26,0.15);
  padding-bottom:3px;
}
.stat-row {
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  padding:2px 0;
  font-size:11px;
}
.stat-row .sk { color:#666; }
.stat-row .sv { font-weight:700; color:#1a1a1a; font-size:12px; }

/* 포지션 블록 특수 처리 */
.pos-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:2px 0;
  font-size:11px;
}
.pos-bar-wrap {
  flex:1;
  height:5px;
  background:rgba(0,0,0,0.07);
  border-radius:3px;
  margin:0 6px;
  overflow:hidden;
}
.pos-bar {
  height:100%;
  background:#d4001a;
  border-radius:3px;
  transition:width 0.3s;
}
.pos-pct { font-weight:700; font-size:11px; color:#1a1a1a; min-width:32px; text-align:right; }

/* ─── 빈 상태 ─── */
.empty-stat {
  background:#fff;
  border:1px dashed rgba(0,0,0,0.12);
  border-radius:4px;
  padding:24px 12px;
  text-align:center;
  color:#bbb;
  font-size:12px;
  letter-spacing:1px;
}

/* ─── 우측 사이드 네비게이션 ─── */
.side-nav {
  position:fixed;right:0;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;
  background:#fff;
  border-radius:6px 0 0 6px;overflow:hidden;z-index:200;
  box-shadow:-2px 0 12px rgba(0,0,0,0.12), inset 0 0 0 1px rgba(0,0,0,0.07);
}
.side-nav a {
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:11px 8px;font-family:'Bebas Neue',sans-serif;font-size:8px;
  letter-spacing:1.5px;color:#666;text-decoration:none;gap:4px;min-width:44px;
  border-left:2px solid transparent;transition:color 0.15s,background 0.15s;line-height:1;
}
.side-nav a:hover { color:#1a1a1a;background:rgba(0,0,0,0.04); }
.side-nav a.active { color:#d4001a;border-left-color:#d4001a;background:rgba(212,0,26,0.07); }
.side-nav-sep { height:1px;background:rgba(0,0,0,0.08); }
.side-nav-icon { font-size:14px;line-height:1; }

/* ─── 모바일 반응형 ─── */
@media (max-width:580px) {
  html, body { overflow:auto; height:auto; }
  .main-grid {
    grid-template-columns:1fr;
    grid-template-rows:auto auto;
    overflow:visible;
    flex:none;
  }
  .fighter-col { order:2; height:auto; overflow:visible; }
  .fighter-list-body { overflow:visible; flex:none; max-height:none; }
  .stat-col { order:1; height:auto; overflow:visible; }
}
</style>
</head>
<body>

<nav class="side-nav">
  <a href="/" title="Home"><span class="side-nav-icon">⌂</span>HOME</a>
  <div class="side-nav-sep"></div>
  <a href="/mma-stat.html"><span class="side-nav-icon">◈</span>STAT</a>
  <a href="/mma-predict.html"><span class="side-nav-icon">⚔</span>PREDICT</a>
  <a href="/mma-fighter-db.html" class="active"><span class="side-nav-icon">🗂</span>DB</a>
  <a href="/mma-anim-demo.html"><span class="side-nav-icon">▶</span>DEMO</a>
</nav>

<!-- 상단 바 -->
<div class="top-bar">
  <h1>FIGHTER DB</h1>
  <a href="/" class="btn-outline">HOME</a>
</div>

<!-- 검색 -->
<div class="search-panel">
  <span class="search-label">검색</span>
  <input type="text" id="nameInput" placeholder="FIGHTER NAME (EN)" />
  <button class="btn" id="searchBtn">검색</button>
</div>

<div class="status" id="status"></div>

<!-- 2열 메인 -->
<div class="main-grid">

  <!-- 왼쪽: 선수 목록 -->
  <div class="fighter-col">
    <div class="col-header">
      <span class="col-header-title">저장된 선수</span>
      <div class="col-header-actions">
        <button class="btn-outline" id="refreshBtn">↻</button>
        <button class="btn-outline" id="deleteAllBtn" style="border-color:rgba(212,0,26,0.35);color:#d4001a;">전체삭제</button>
      </div>
    </div>
    <div class="fighter-list-body" id="fighterListBody"></div>
  </div>

  <!-- 오른쪽: 스탯 패널 -->
  <div class="stat-col">

    <!-- 비어있을 때 -->
    <div class="empty-stat" id="emptyHint">선수를 검색하거나 목록에서 선택하세요</div>

    <!-- 스탯 결과 -->
    <div class="stat-panel" id="resultPanel">
      <div class="stat-panel-name" id="resultTitle">—</div>

      <div class="stats-grid">
        <!-- 전적 -->
        <div class="stat-block">
          <div class="stat-block-title">전적</div>
          <div class="stat-row"><span class="sk">승 / 패</span><span class="sv"><span id="s_total_wins">—</span> / <span id="s_total_losses">—</span></span></div>
          <div class="stat-row"><span class="sk">KO/TKO</span><span class="sv" id="s_ko_wins">—</span></div>
          <div class="stat-row"><span class="sk">서브미션</span><span class="sv" id="s_sub_wins">—</span></div>
          <div class="stat-row"><span class="sk">판정</span><span class="sv" id="s_dec_wins">—</span></div>
        </div>

        <!-- 타격 -->
        <div class="stat-block">
          <div class="stat-block-title">타격</div>
          <div class="stat-row"><span class="sk">SLpM</span><span class="sv" id="s_strike_per_min">—</span></div>
          <div class="stat-row"><span class="sk">SApM</span><span class="sv" id="s_allowed_per_min">—</span></div>
          <div class="stat-row"><span class="sk">정확도</span><span class="sv" id="s_striking_accuracy">—</span></div>
          <div class="stat-row"><span class="sk">방어율</span><span class="sv" id="s_striking_defense">—</span></div>
          <div class="stat-row"><span class="sk">KD avg</span><span class="sv" id="s_kd_avg">—</span></div>
        </div>

        <!-- 레슬링 -->
        <div class="stat-block">
          <div class="stat-block-title">레슬링 / 그래플링</div>
          <div class="stat-row"><span class="sk">TD/15min</span><span class="sv" id="s_td_per_15">—</span></div>
          <div class="stat-row"><span class="sk">TD 정확도</span><span class="sv" id="s_takedown_accuracy">—</span></div>
          <div class="stat-row"><span class="sk">TD 방어율</span><span class="sv" id="s_takedown_defense">—</span></div>
          <div class="stat-row"><span class="sk">Sub/15min</span><span class="sv" id="s_subs_per_15">—</span></div>
          <div class="stat-row"><span class="sk">평균 경기(분)</span><span class="sv" id="s_avg_fight_min">—</span></div>
        </div>

        <!-- 포지션 -->
        <div class="stat-block">
          <div class="stat-block-title">포지션 별 타격</div>
          <div class="pos-row">
            <span class="sk" style="min-width:42px;font-size:11px;">스탠딩</span>
            <div class="pos-bar-wrap"><div class="pos-bar" id="s_pos_standing_bar" style="width:0%"></div></div>
            <span class="pos-pct" id="s_pos_standing_pct">—</span>
          </div>
          <div class="pos-row">
            <span class="sk" style="min-width:42px;font-size:11px;">클린치</span>
            <div class="pos-bar-wrap"><div class="pos-bar" id="s_pos_clinch_bar" style="width:0%"></div></div>
            <span class="pos-pct" id="s_pos_clinch_pct">—</span>
          </div>
          <div class="pos-row">
            <span class="sk" style="min-width:42px;font-size:11px;">그라운드</span>
            <div class="pos-bar-wrap"><div class="pos-bar" id="s_pos_ground_bar" style="width:0%"></div></div>
            <span class="pos-pct" id="s_pos_ground_pct">—</span>
          </div>
          <div class="stat-row" style="margin-top:4px;border-top:1px solid rgba(0,0,0,0.05);padding-top:4px;">
            <span class="sk">스탠딩 횟수</span><span class="sv" id="s_pos_standing_count">—</span>
          </div>
          <div class="stat-row">
            <span class="sk">클린치 횟수</span><span class="sv" id="s_pos_clinch_count">—</span>
          </div>
          <div class="stat-row">
            <span class="sk">그라운드 횟수</span><span class="sv" id="s_pos_ground_count">—</span>
          </div>
        </div>
      </div><!-- /stats-grid -->

      <button class="btn-save" id="saveBtn" style="display:none;">DB에 저장</button>
    </div><!-- /stat-panel -->

  </div><!-- /stat-col -->
</div><!-- /main-grid -->

<script>
var _current = null;
var _savedData = {};

function showStatus(msg, type) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
  el.style.display = 'block';
}

function pct(v) { return (v * 100).toFixed(1) + '%'; }
function fix2(v) { return parseFloat(v).toFixed(2); }

function setBar(id, pct) {
  var el = document.getElementById(id);
  if (el) el.style.width = (pct || 0) + '%';
}

function fillStats(d) {
  var isRaw = !!d.raw;

  var wc = (d.weightClass || d.weight_class || '');
  var name = (d.slug || '').toUpperCase().replace(/-/g,' ');
  document.getElementById('resultTitle').innerHTML =
    name + (wc ? '<span>' + wc + '</span>' : '');

  if (isRaw) {
    var r = d.raw, pos = d.position;
    document.getElementById('s_total_wins').textContent   = r.total_wins;
    document.getElementById('s_total_losses').textContent = r.total_losses;
    var wm = d.winMethod;
    document.getElementById('s_ko_wins').textContent  = r.ko_wins  + (wm ? ' (' + wm.koBar.pct  + '%)' : '');
    document.getElementById('s_sub_wins').textContent  = r.sub_wins + (wm ? ' (' + wm.subBar.pct + '%)' : '');
    document.getElementById('s_dec_wins').textContent  = r.dec_wins + (wm ? ' (' + wm.decBar.pct + '%)' : '');
    document.getElementById('s_strike_per_min').textContent   = fix2(r.strikePerMin);
    document.getElementById('s_allowed_per_min').textContent  = fix2(r.allowedPerMin);
    document.getElementById('s_striking_accuracy').textContent = pct(r.striking_accuracy);
    document.getElementById('s_striking_defense').textContent  = pct(r.striking_defense);
    document.getElementById('s_kd_avg').textContent            = fix2(r.kd_avg);
    document.getElementById('s_td_per_15').textContent         = fix2(r.td_per_15);
    document.getElementById('s_takedown_accuracy').textContent = pct(r.takedown_accuracy);
    document.getElementById('s_takedown_defense').textContent  = pct(r.takedown_defense);
    document.getElementById('s_subs_per_15').textContent       = fix2(r.subs_per_15);
    document.getElementById('s_avg_fight_min').textContent     = fix2(r.avg_fight_min);
    document.getElementById('s_pos_standing_count').textContent = pos.posStanding.count;
    document.getElementById('s_pos_clinch_count').textContent   = pos.posClinch.count;
    document.getElementById('s_pos_ground_count').textContent   = pos.posGround.count;
    document.getElementById('s_pos_standing_pct').textContent   = pos.posStanding.pct + '%';
    document.getElementById('s_pos_clinch_pct').textContent     = pos.posClinch.pct + '%';
    document.getElementById('s_pos_ground_pct').textContent     = pos.posGround.pct + '%';
    setBar('s_pos_standing_bar', pos.posStanding.pct);
    setBar('s_pos_clinch_bar',   pos.posClinch.pct);
    setBar('s_pos_ground_bar',   pos.posGround.pct);
  } else {
    document.getElementById('s_total_wins').textContent   = d.total_wins;
    document.getElementById('s_total_losses').textContent = d.total_losses;
    document.getElementById('s_ko_wins').textContent  = d.ko_wins  + (d.ko_wins_pct  ? ' (' + d.ko_wins_pct  + '%)' : '');
    document.getElementById('s_sub_wins').textContent  = d.sub_wins + (d.sub_wins_pct ? ' (' + d.sub_wins_pct + '%)' : '');
    document.getElementById('s_dec_wins').textContent  = d.dec_wins + (d.dec_wins_pct ? ' (' + d.dec_wins_pct + '%)' : '');
    document.getElementById('s_strike_per_min').textContent   = fix2(d.strike_per_min);
    document.getElementById('s_allowed_per_min').textContent  = fix2(d.allowed_per_min);
    document.getElementById('s_striking_accuracy').textContent = pct(d.striking_accuracy);
    document.getElementById('s_striking_defense').textContent  = pct(d.striking_defense);
    document.getElementById('s_kd_avg').textContent            = fix2(d.kd_avg);
    document.getElementById('s_td_per_15').textContent         = fix2(d.td_per_15);
    document.getElementById('s_takedown_accuracy').textContent = pct(d.takedown_accuracy);
    document.getElementById('s_takedown_defense').textContent  = pct(d.takedown_defense);
    document.getElementById('s_subs_per_15').textContent       = fix2(d.subs_per_15);
    document.getElementById('s_avg_fight_min').textContent     = fix2(d.avg_fight_min);
    document.getElementById('s_pos_standing_count').textContent = d.pos_standing_count ?? '—';
    document.getElementById('s_pos_clinch_count').textContent   = d.pos_clinch_count ?? '—';
    document.getElementById('s_pos_ground_count').textContent   = d.pos_ground_count ?? '—';
    document.getElementById('s_pos_standing_pct').textContent   = d.pos_standing_pct != null ? d.pos_standing_pct + '%' : '—';
    document.getElementById('s_pos_clinch_pct').textContent     = d.pos_clinch_pct != null ? d.pos_clinch_pct + '%' : '—';
    document.getElementById('s_pos_ground_pct').textContent     = d.pos_ground_pct != null ? d.pos_ground_pct + '%' : '—';
    setBar('s_pos_standing_bar', d.pos_standing_pct || 0);
    setBar('s_pos_clinch_bar',   d.pos_clinch_pct   || 0);
    setBar('s_pos_ground_bar',   d.pos_ground_pct   || 0);
  }

  document.getElementById('emptyHint').style.display = 'none';
  document.getElementById('resultPanel').style.display = 'flex';
}

// 검색
document.getElementById('searchBtn').addEventListener('click', function() {
  var name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  var btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '검색 중...';
  document.getElementById('saveBtn').style.display = 'none';
  document.getElementById('status').style.display = 'none';
  setActive(null);

  fetch('/api/fighter?name=' + encodeURIComponent(name))
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
      if (!res.ok) { showStatus(res.data.error || '선수를 찾을 수 없습니다.', 'err'); return; }
      _current = res.data;
      _current._name = name;
      _current._mode = 'search';
      fillStats(res.data);
      document.getElementById('saveBtn').style.display = 'block';
      showStatus('✓ 데이터 로드 완료 — 확인 후 저장하세요', 'ok');
    })
    .catch(function() { showStatus('오류가 발생했습니다.', 'err'); })
    .finally(function() { btn.disabled = false; btn.textContent = '검색'; });
});

// 저장
document.getElementById('saveBtn').addEventListener('click', function() {
  if (!_current || _current._mode !== 'search') return;
  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  var r = _current.raw, pos = _current.position;
  var body = {
    slug: _current.slug, name: _current._name, weight_class: _current.weightClass,
    total_wins: r.total_wins, total_losses: r.total_losses,
    ko_wins: r.ko_wins, sub_wins: r.sub_wins, dec_wins: r.dec_wins,
    ko_wins_pct: _current.winMethod ? _current.winMethod.koBar.pct  : 0,
    dec_wins_pct: _current.winMethod ? _current.winMethod.decBar.pct : 0,
    sub_wins_pct: _current.winMethod ? _current.winMethod.subBar.pct : 0,
    ko_losses: r.ko_losses, sub_losses: r.sub_losses, dec_losses: r.dec_losses,
    strike_per_min: r.strikePerMin, allowed_per_min: r.allowedPerMin,
    striking_accuracy: r.striking_accuracy, striking_defense: r.striking_defense,
    takedown_accuracy: r.takedown_accuracy, takedown_defense: r.takedown_defense,
    td_per_15: r.td_per_15, subs_per_15: r.subs_per_15,
    avg_fight_min: r.avg_fight_min, kd_avg: r.kd_avg,
    pos_standing_count: pos.posStanding.count, pos_standing_pct: pos.posStanding.pct,
    pos_clinch_count: pos.posClinch.count,     pos_clinch_pct: pos.posClinch.pct,
    pos_ground_count: pos.posGround.count,     pos_ground_pct: pos.posGround.pct,
  };

  fetch('/api/ufc-fighters', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.ok) {
        showStatus('✓ 저장 완료: ' + _current._name, 'ok');
        btn.textContent = '저장 완료 ✓';
        loadFighters();
        setTimeout(function() { btn.textContent = 'DB에 저장'; btn.disabled = false; }, 2000);
      } else {
        showStatus('저장 실패: ' + (res.error || ''), 'err');
        btn.disabled = false; btn.textContent = 'DB에 저장';
      }
    })
    .catch(function() {
      showStatus('저장 중 오류.', 'err');
      btn.disabled = false; btn.textContent = 'DB에 저장';
    });
});

function setActive(slug) {
  document.querySelectorAll('.fighter-row').forEach(function(el) {
    el.classList.toggle('active', el.dataset.slug === slug);
  });
}

function loadFighters() {
  fetch('/api/ufc-fighters')
    .then(function(r) { return r.json(); })
    .then(function(rows) {
      _savedData = {};
      rows.forEach(function(f) { _savedData[f.slug] = f; });

      var el = document.getElementById('fighterListBody');
      if (!rows.length) {
        el.innerHTML = '<div style="color:#bbb;font-size:11px;padding:6px 2px;letter-spacing:0.5px;">저장된 선수 없음</div>';
        return;
      }
      el.innerHTML = rows.map(function(f) {
        return '<div class="fighter-row" data-slug="' + f.slug + '">' +
          '<div onclick="openSaved(\'' + f.slug + '\')" style="flex:1;min-width:0;">' +
            '<div class="fname">' + f.name.toUpperCase() + '</div>' +
            '<div class="fmeta">' + (f.weight_class || '—') + ' · ' + f.total_wins + 'W ' + f.total_losses + 'L</div>' +
          '</div>' +
          '<button class="btn-del" onclick="deleteFighter(event,\'' + f.slug + '\',\'' + f.name + '\')">DEL</button>' +
        '</div>';
      }).join('');
    });
}

function openSaved(slug) {
  var f = _savedData[slug];
  if (!f) return;
  _current = null;
  document.getElementById('saveBtn').style.display = 'none';
  document.getElementById('status').style.display = 'none';
  fillStats(f);
  setActive(slug);
}

function deleteFighter(e, slug, name) {
  e.stopPropagation();
  if (!confirm(name + ' 삭제할까요?')) return;
  fetch('/api/ufc-fighters/' + slug, { method:'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.ok) {
        if (document.querySelector('.fighter-row.active[data-slug="' + slug + '"]')) {
          document.getElementById('resultPanel').style.display = 'none';
          document.getElementById('emptyHint').style.display = 'block';
        }
        loadFighters();
      }
    });
}

document.getElementById('refreshBtn').addEventListener('click', loadFighters);

document.getElementById('deleteAllBtn').addEventListener('click', function() {
  var count = Object.keys(_savedData).length;
  if (!count) { showStatus('삭제할 선수가 없습니다.', 'err'); return; }
  if (!confirm('저장된 선수 ' + count + '명을 모두 삭제할까요?')) return;
  fetch('/api/ufc-fighters', { method:'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.ok) {
        document.getElementById('resultPanel').style.display = 'none';
        document.getElementById('emptyHint').style.display = 'block';
        showStatus('✓ 전체 삭제 완료', 'ok');
        loadFighters();
      } else {
        showStatus('삭제 실패: ' + (res.error || ''), 'err');
      }
    })
    .catch(function() { showStatus('삭제 중 오류.', 'err'); });
});

document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('searchBtn').click();
});

loadFighters();
</script>
</body>
</html>
