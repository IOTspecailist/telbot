<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fighter DB</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#f2ede4;
  color:#1a1a1a;
  font-family:'Barlow Condensed',sans-serif;
  padding:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}
.top-bar {
  width:100%;
  max-width:520px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.top-bar h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;
  color:#1a1a1a;
  letter-spacing:4px;
}
.panel {
  width:100%;
  max-width:520px;
  background:#fff;
  border:1px solid rgba(212,0,26,0.15);
  border-left:3px solid #d4001a;
  border-radius:4px;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  box-shadow:0 1px 6px rgba(0,0,0,0.06);
}
.panel h2 {
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;
  color:#d4001a;
  letter-spacing:3px;
}
.row { display:flex; gap:8px; }
input[type=text] {
  flex:1;
  background:#fafafa;
  border:1px solid rgba(0,0,0,0.13);
  border-radius:3px;
  color:#1a1a1a;
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;
  letter-spacing:2px;
  padding:8px 12px;
  outline:none;
}
input[type=text]:focus { border-color:#d4001a; }
.btn {
  padding:8px 18px;
  background:#d4001a;
  border:none;
  border-radius:3px;
  font-family:'Bebas Neue',sans-serif;
  font-size:14px;
  letter-spacing:2px;
  color:#fff;
  cursor:pointer;
  white-space:nowrap;
}
.btn:hover { background:#b8001a; }
.btn:disabled { background:#ccc; cursor:default; }
.btn-outline {
  padding:7px 14px;
  background:#fff;
  border:1px solid rgba(0,0,0,0.18);
  border-radius:3px;
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;
  letter-spacing:2px;
  color:#555;
  cursor:pointer;
  white-space:nowrap;
  text-decoration:none;
  display:inline-block;
}
.btn-outline:hover { border-color:#d4001a; color:#d4001a; }
.btn-save {
  width:100%;
  max-width:520px;
  padding:13px;
  background:#1a6b1a;
  border:none;
  border-radius:4px;
  font-family:'Bebas Neue',sans-serif;
  font-size:15px;
  letter-spacing:3px;
  color:#fff;
  cursor:pointer;
}
.btn-save:hover { background:#155515; }
.btn-save:disabled { background:#ccc; cursor:default; }
.status {
  width:100%;
  max-width:520px;
  padding:9px 12px;
  font-size:13px;
  font-weight:700;
  letter-spacing:1px;
  border-radius:4px;
  display:none;
}
.status.ok  { background:rgba(26,107,26,0.08); border:1px solid rgba(26,107,26,0.3); color:#1a6b1a; }
.status.err { background:rgba(212,0,26,0.07); border:1px solid rgba(212,0,26,0.3); color:#d4001a; }

/* 스탯 테이블 */
.stat-table {
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
.stat-table th {
  text-align:left;
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;
  letter-spacing:2px;
  color:#d4001a;
  padding:4px 6px;
  border-bottom:1px solid rgba(212,0,26,0.2);
}
.stat-table td {
  padding:4px 6px;
  border-bottom:1px solid rgba(0,0,0,0.05);
  color:#333;
}
.stat-table td:last-child { text-align:right; font-weight:700; color:#1a1a1a; }
.stat-section-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;
  color:#d4001a;
  letter-spacing:3px;
  margin-top:8px;
  padding-bottom:3px;
  border-bottom:1px solid rgba(212,0,26,0.2);
}

/* 저장된 선수 목록 */
.fighter-list {
  width:100%;
  max-width:520px;
}
.fighter-list-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}
.fighter-list-header span {
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;
  color:#d4001a;
  letter-spacing:3px;
}
.fighter-row {
  background:#fff;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:3px;
  padding:8px 12px;
  margin-bottom:6px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  transition:border-color 0.15s;
}
.fighter-row:hover { border-color:#d4001a; }
.fighter-row.active { border-color:#d4001a; border-left:3px solid #d4001a; }
.fighter-row .fname {
  font-family:'Bebas Neue',sans-serif;
  font-size:15px;
  letter-spacing:1px;
}
.fighter-row .fmeta { color:#888; font-size:11px; margin-top:1px; }
.fighter-row .row-actions { display:flex; gap:6px; align-items:center; }
.btn-del {
  padding:4px 10px;
  background:#fff;
  border:1px solid rgba(212,0,26,0.3);
  border-radius:3px;
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;
  letter-spacing:1px;
  color:#d4001a;
  cursor:pointer;
}
.btn-del:hover { background:#d4001a; color:#fff; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>FIGHTER DB</h1>
  <a href="/" class="btn-outline">HOME</a>
</div>

<!-- 검색 -->
<div class="panel">
  <h2>선수 검색 (UFC 홈페이지)</h2>
  <div class="row">
    <input type="text" id="nameInput" placeholder="FIGHTER NAME (EN)" />
    <button class="btn" id="searchBtn">검색</button>
  </div>
</div>

<div class="status" id="status"></div>

<!-- 스탯 결과 -->
<div class="panel" id="resultPanel" style="display:none;">
  <h2 id="resultTitle">—</h2>

  <div class="stat-section-title">전적</div>
  <table class="stat-table">
    <tr><td>총 승</td><td id="s_total_wins">—</td></tr>
    <tr><td>총 패</td><td id="s_total_losses">—</td></tr>
    <tr><td>KO/TKO 승</td><td id="s_ko_wins">—</td></tr>
    <tr><td>서브미션 승</td><td id="s_sub_wins">—</td></tr>
    <tr><td>판정 승</td><td id="s_dec_wins">—</td></tr>
  </table>

  <div class="stat-section-title">타격</div>
  <table class="stat-table">
    <tr><td>SLpM (분당 타격)</td><td id="s_strike_per_min">—</td></tr>
    <tr><td>SApM (분당 피격)</td><td id="s_allowed_per_min">—</td></tr>
    <tr><td>타격 정확도</td><td id="s_striking_accuracy">—</td></tr>
    <tr><td>타격 방어율</td><td id="s_striking_defense">—</td></tr>
    <tr><td>KD avg</td><td id="s_kd_avg">—</td></tr>
  </table>

  <div class="stat-section-title">레슬링 / 그래플링</div>
  <table class="stat-table">
    <tr><td>TD per 15min</td><td id="s_td_per_15">—</td></tr>
    <tr><td>TD 정확도</td><td id="s_takedown_accuracy">—</td></tr>
    <tr><td>TD 방어율</td><td id="s_takedown_defense">—</td></tr>
    <tr><td>Sub per 15min</td><td id="s_subs_per_15">—</td></tr>
    <tr><td>평균 경기 시간 (분)</td><td id="s_avg_fight_min">—</td></tr>
  </table>

  <div class="stat-section-title">포지션 별 중요 타격</div>
  <table class="stat-table">
    <thead><tr><th>포지션</th><th>횟수</th><th>비율</th></tr></thead>
    <tbody>
      <tr><td>스탠딩</td><td id="s_pos_standing_count">—</td><td id="s_pos_standing_pct">—</td></tr>
      <tr><td>클린치</td><td id="s_pos_clinch_count">—</td><td id="s_pos_clinch_pct">—</td></tr>
      <tr><td>그라운드</td><td id="s_pos_ground_count">—</td><td id="s_pos_ground_pct">—</td></tr>
    </tbody>
  </table>
</div>

<button class="btn-save" id="saveBtn" style="display:none;">DB에 저장</button>

<!-- 저장된 선수 목록 -->
<div class="fighter-list">
  <div class="fighter-list-header">
    <span>저장된 선수</span>
    <button class="btn-outline" id="refreshBtn">새로고침</button>
  </div>
  <div id="fighterListBody"></div>
</div>

<script>
var _current = null;
var _savedData = {};  // slug → row 캐시

function showStatus(msg, type) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
  el.style.display = 'block';
}

function pct(v) { return (v * 100).toFixed(1) + '%'; }
function fix2(v) { return parseFloat(v).toFixed(2); }

function fillStats(d) {
  // d는 /api/fighter 응답 또는 저장된 row
  var isRaw = !!d.raw;  // API 응답이면 raw/position/target 구조, DB row면 flat 구조

  var title = (d.slug || '').toUpperCase().replace(/-/g,' ') + '  ·  ' + (d.weightClass || d.weight_class || '');
  document.getElementById('resultTitle').textContent = title;

  if (isRaw) {
    var r = d.raw, pos = d.position;
    document.getElementById('s_total_wins').textContent   = r.total_wins;
    document.getElementById('s_total_losses').textContent = r.total_losses;
    document.getElementById('s_ko_wins').textContent      = r.ko_wins;
    document.getElementById('s_sub_wins').textContent     = r.sub_wins;
    document.getElementById('s_dec_wins').textContent     = r.dec_wins;
    document.getElementById('s_strike_per_min').textContent   = fix2(r.strikePerMin);
    document.getElementById('s_allowed_per_min').textContent  = fix2(r.allowedPerMin);
    document.getElementById('s_striking_accuracy').textContent = pct(r.striking_accuracy);
    document.getElementById('s_striking_defense').textContent  = pct(r.striking_defense);
    document.getElementById('s_kd_avg').textContent            = fix2(r.kd_avg);
    document.getElementById('s_td_per_15').textContent         = fix2(r.td_per_15);
    document.getElementById('s_takedown_accuracy').textContent = pct(r.takedown_accuracy);
    document.getElementById('s_takedown_defense').textContent  = pct(r.takedown_defense);
    document.getElementById('s_subs_per_15').textContent       = fix2(r.subs_per_15);
    document.getElementById('s_avg_fight_min').textContent     = fix2(r.avg_fight_min);
    document.getElementById('s_pos_standing_count').textContent = pos.posStanding.count;
    document.getElementById('s_pos_standing_pct').textContent   = pos.posStanding.pct + '%';
    document.getElementById('s_pos_clinch_count').textContent   = pos.posClinch.count;
    document.getElementById('s_pos_clinch_pct').textContent     = pos.posClinch.pct + '%';
    document.getElementById('s_pos_ground_count').textContent   = pos.posGround.count;
    document.getElementById('s_pos_ground_pct').textContent     = pos.posGround.pct + '%';
  } else {
    // DB row: flat 구조
    document.getElementById('s_total_wins').textContent   = d.total_wins;
    document.getElementById('s_total_losses').textContent = d.total_losses;
    document.getElementById('s_ko_wins').textContent      = d.ko_wins;
    document.getElementById('s_sub_wins').textContent     = d.sub_wins;
    document.getElementById('s_dec_wins').textContent     = d.dec_wins;
    document.getElementById('s_strike_per_min').textContent   = fix2(d.strike_per_min);
    document.getElementById('s_allowed_per_min').textContent  = fix2(d.allowed_per_min);
    document.getElementById('s_striking_accuracy').textContent = pct(d.striking_accuracy);
    document.getElementById('s_striking_defense').textContent  = pct(d.striking_defense);
    document.getElementById('s_kd_avg').textContent            = fix2(d.kd_avg);
    document.getElementById('s_td_per_15').textContent         = fix2(d.td_per_15);
    document.getElementById('s_takedown_accuracy').textContent = pct(d.takedown_accuracy);
    document.getElementById('s_takedown_defense').textContent  = pct(d.takedown_defense);
    document.getElementById('s_subs_per_15').textContent       = fix2(d.subs_per_15);
    document.getElementById('s_avg_fight_min').textContent     = fix2(d.avg_fight_min);
    document.getElementById('s_pos_standing_count').textContent = d.pos_standing_count ?? '—';
    document.getElementById('s_pos_standing_pct').textContent   = d.pos_standing_pct != null ? d.pos_standing_pct + '%' : '—';
    document.getElementById('s_pos_clinch_count').textContent   = d.pos_clinch_count ?? '—';
    document.getElementById('s_pos_clinch_pct').textContent     = d.pos_clinch_pct != null ? d.pos_clinch_pct + '%' : '—';
    document.getElementById('s_pos_ground_count').textContent   = d.pos_ground_count ?? '—';
    document.getElementById('s_pos_ground_pct').textContent     = d.pos_ground_pct != null ? d.pos_ground_pct + '%' : '—';
  }

  document.getElementById('resultPanel').style.display = 'flex';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 검색
document.getElementById('searchBtn').addEventListener('click', function() {
  var name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  var btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '검색 중...';
  document.getElementById('saveBtn').style.display = 'none';
  document.getElementById('status').style.display = 'none';
  setActive(null);

  fetch('/api/fighter?name=' + encodeURIComponent(name))
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
      if (!res.ok) { showStatus(res.data.error || '선수를 찾을 수 없습니다.', 'err'); return; }
      _current = res.data;
      _current._name = name;
      _current._mode = 'search';
      fillStats(res.data);
      document.getElementById('saveBtn').style.display = 'block';
      showStatus('✓ 데이터 로드 완료 — 확인 후 저장하세요', 'ok');
    })
    .catch(function() { showStatus('오류가 발생했습니다.', 'err'); })
    .finally(function() { btn.disabled = false; btn.textContent = '검색'; });
});

// 저장
document.getElementById('saveBtn').addEventListener('click', function() {
  if (!_current || _current._mode !== 'search') return;
  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  var r = _current.raw, pos = _current.position;
  var body = {
    slug: _current.slug, name: _current._name, weight_class: _current.weightClass,
    total_wins: r.total_wins, total_losses: r.total_losses,
    ko_wins: r.ko_wins, sub_wins: r.sub_wins, dec_wins: r.dec_wins,
    ko_losses: r.ko_losses, sub_losses: r.sub_losses, dec_losses: r.dec_losses,
    strike_per_min: r.strikePerMin, allowed_per_min: r.allowedPerMin,
    striking_accuracy: r.striking_accuracy, striking_defense: r.striking_defense,
    takedown_accuracy: r.takedown_accuracy, takedown_defense: r.takedown_defense,
    td_per_15: r.td_per_15, subs_per_15: r.subs_per_15,
    avg_fight_min: r.avg_fight_min, kd_avg: r.kd_avg,
    pos_standing_count: pos.posStanding.count, pos_standing_pct: pos.posStanding.pct,
    pos_clinch_count: pos.posClinch.count,     pos_clinch_pct: pos.posClinch.pct,
    pos_ground_count: pos.posGround.count,     pos_ground_pct: pos.posGround.pct,
  };

  fetch('/api/ufc-fighters', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.ok) {
        showStatus('✓ 저장 완료: ' + _current._name, 'ok');
        btn.textContent = '저장 완료 ✓';
        loadFighters();
        setTimeout(function() { btn.textContent = 'DB에 저장'; btn.disabled = false; }, 2000);
      } else {
        showStatus('저장 실패: ' + (res.error || ''), 'err');
        btn.disabled = false; btn.textContent = 'DB에 저장';
      }
    })
    .catch(function() {
      showStatus('저장 중 오류.', 'err');
      btn.disabled = false; btn.textContent = 'DB에 저장';
    });
});

// 활성 행 표시
function setActive(slug) {
  document.querySelectorAll('.fighter-row').forEach(function(el) {
    el.classList.toggle('active', el.dataset.slug === slug);
  });
}

// 목록 로드
function loadFighters() {
  fetch('/api/ufc-fighters')
    .then(function(r) { return r.json(); })
    .then(function(rows) {
      _savedData = {};
      rows.forEach(function(f) { _savedData[f.slug] = f; });

      var el = document.getElementById('fighterListBody');
      if (!rows.length) {
        el.innerHTML = '<div style="color:#aaa;font-size:13px;padding:8px 0;">저장된 선수 없음</div>';
        return;
      }
      el.innerHTML = rows.map(function(f) {
        var date = new Date(f.fetched_at).toLocaleDateString('ko-KR');
        return '<div class="fighter-row" data-slug="' + f.slug + '">' +
          '<div onclick="openSaved(\'' + f.slug + '\')" style="flex:1;">' +
            '<div class="fname">' + f.name.toUpperCase() + '</div>' +
            '<div class="fmeta">' + (f.weight_class || '—') + ' · ' + f.total_wins + 'W ' + f.total_losses + 'L · ' + date + '</div>' +
          '</div>' +
          '<div class="row-actions">' +
            '<button class="btn-del" onclick="deleteFighter(event,\'' + f.slug + '\',\'' + f.name + '\')">삭제</button>' +
          '</div>' +
        '</div>';
      }).join('');
    });
}

// 저장된 선수 보기
function openSaved(slug) {
  var f = _savedData[slug];
  if (!f) return;
  _current = null;
  document.getElementById('saveBtn').style.display = 'none';
  document.getElementById('status').style.display = 'none';
  fillStats(f);
  setActive(slug);
}

// 삭제
function deleteFighter(e, slug, name) {
  e.stopPropagation();
  if (!confirm(name + ' 삭제할까요?')) return;
  fetch('/api/ufc-fighters/' + slug, { method:'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.ok) {
        // 현재 표시 중이면 패널 닫기
        if (document.querySelector('.fighter-row.active[data-slug="' + slug + '"]')) {
          document.getElementById('resultPanel').style.display = 'none';
        }
        loadFighters();
      }
    });
}

document.getElementById('refreshBtn').addEventListener('click', loadFighters);
document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('searchBtn').click();
});

loadFighters();
</script>
</body>
</html>
