<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMA Winner Prediction</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#f2ede4;
  color:#1a1a1a;
  font-family:'Barlow Condensed',sans-serif;
  padding:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  min-height:100vh;
}
.top-bar {
  width:100%;
  max-width:480px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
.top-bar-nav { display:flex; gap:8px; align-items:center; }
.top-bar a {
  font-size:12px;
  color:#666;
  text-decoration:none;
  letter-spacing:1px;
  font-weight:700;
  white-space:nowrap;
}
.top-bar a:hover { color:#d4001a; }
.top-bar h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;
  letter-spacing:4px;
  color:#d4001a;
}
.section-label {
  width:100%;
  max-width:480px;
  font-family:'Bebas Neue',sans-serif;
  font-size:12px;
  color:#d4001a;
  letter-spacing:3px;
  border-bottom:1px solid rgba(212,0,26,0.3);
  padding-bottom:6px;
}
/* 애니메이션 선택 바 */
.anim-bar {
  width:100%;
  max-width:480px;
  display:flex;
  align-items:center;
  gap:10px;
}
.anim-bar label {
  font-family:'Bebas Neue',sans-serif;
  font-size:12px;
  letter-spacing:2px;
  color:#888;
  white-space:nowrap;
}
.anim-select {
  flex:1;
  background:#fff;
  border:1px solid rgba(212,0,26,0.3);
  border-radius:3px;
  color:#1a1a1a;
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;
  letter-spacing:1px;
  padding:5px 8px;
  cursor:pointer;
  outline:none;
}
.anim-select:focus { border-color:#d4001a; }
.btn-reset {
  padding:5px 14px;
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;
  letter-spacing:2px;
  border:none;
  border-radius:3px;
  cursor:pointer;
  background:#888;
  color:#fff;
  white-space:nowrap;
}
.btn-reset:hover { background:#555; }
/* 카드 풀 */
.card-pool {
  width:100%;
  max-width:480px;
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding-bottom:6px;
}
.card-pool::-webkit-scrollbar { height:3px; }
.card-pool::-webkit-scrollbar-thumb { background:#d4001a; border-radius:2px; }
.pool-card {
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  cursor:grab;
}
.pool-card img {
  width:80px;
  height:109px;
  border-radius:3px;
  border:2px solid rgba(0,0,0,0.1);
  display:block;
  pointer-events:none;
  object-fit:cover;
}
.pool-card:hover img { border-color:rgba(212,0,26,0.6); }
.pool-card .card-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:10px;
  color:#555;
  letter-spacing:1px;
  text-align:center;
  max-width:80px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.slot-btns { display:flex; gap:4px; }
.slot-btn {
  padding:2px 8px;
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;
  letter-spacing:1px;
  border:none;
  border-radius:2px;
  cursor:pointer;
}
.slot-btn-a { background:#d4001a; color:#fff; }
.slot-btn-b { background:#0055d4; color:#fff; }
.slot-btn:hover { opacity:0.8; }
.no-cards-msg {
  font-size:12px;
  color:#aaa;
  font-weight:700;
  letter-spacing:1px;
  padding:20px 0;
  text-align:center;
  width:100%;
  line-height:1.8;
}
/* VS 구역 */
.vs-container {
  width:100%;
  max-width:480px;
  display:flex;
  align-items:stretch;
  gap:10px;
  position:relative;
  overflow:hidden;
  border-radius:8px;
}
.drop-zone {
  flex:1;
  min-height:150px;
  border:2px dashed rgba(0,0,0,0.15);
  border-radius:6px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:12px;
  transition:border-color 0.2s, background 0.2s;
  position:relative;
  background:#fff;
}
.drop-zone.drag-over {
  border-color:#d4001a;
  background:rgba(212,0,26,0.04);
}
.drop-zone.filled {
  border-style:solid;
  border-color:rgba(212,0,26,0.5);
  background:linear-gradient(145deg,#fff5f5,#fff);
  justify-content:center;
  padding:10px;
}
.drop-zone.filled-b {
  border-style:solid;
  border-color:rgba(0,85,212,0.5);
  background:linear-gradient(145deg,#f0f4ff,#fff);
  justify-content:center;
  padding:10px;
}
.zone-label {
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;
  letter-spacing:3px;
  color:#bbb;
}
.zone-placeholder {
  font-size:11px;
  color:#ccc;
  text-align:center;
  line-height:1.7;
  font-weight:700;
  letter-spacing:1px;
}
/* 드롭존 채워진 상태 — 이름 중심 */
.zone-fighter-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:3px;
  text-align:center;
  line-height:1.1;
  word-break:break-word;
}
.zone-fighter-name-a { color:#d4001a; }
.zone-fighter-name-b { color:#0055d4; }
.zone-fighter-score {
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;
  letter-spacing:2px;
  color:#999;
  margin-top:2px;
}
.zone-fighter-tags {
  display:flex;
  flex-wrap:wrap;
  gap:3px;
  justify-content:center;
  margin-top:4px;
}
.zone-tag {
  font-family:'Bebas Neue',sans-serif;
  font-size:9px;
  letter-spacing:1px;
  padding:1px 5px;
  border-radius:2px;
  color:#888;
  background:rgba(0,0,0,0.06);
}
.zone-clear {
  position:absolute;
  top:6px; right:6px;
  background:rgba(0,0,0,0.1);
  border:none; color:#999;
  font-size:11px;
  width:20px; height:20px;
  border-radius:3px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}
.zone-clear:hover { background:rgba(212,0,26,0.15); color:#d4001a; }
.vs-badge {
  font-family:'Bebas Neue',sans-serif;
  font-size:30px;
  color:#d4001a;
  letter-spacing:2px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  text-shadow:0 0 12px rgba(212,0,26,0.3);
}
/* 결과 */
.result-section {
  width:100%;
  max-width:480px;
  background:#fff;
  border:1px solid rgba(212,0,26,0.2);
  border-radius:6px;
  overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
.result-header {
  background:linear-gradient(90deg,#d4001a,#8a0010);
  padding:10px 16px;
  font-family:'Bebas Neue',sans-serif;
  font-size:14px;
  letter-spacing:4px;
  color:#fff;
}
.result-body {
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:16px;
}
.prob-row { display:flex; flex-direction:column; gap:6px; }
.prob-fighter {
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.prob-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;
  letter-spacing:2px;
  color:#1a1a1a;
}
.winner-tag {
  display:inline-block;
  font-family:'Bebas Neue',sans-serif;
  font-size:10px;
  letter-spacing:2px;
  padding:2px 7px;
  border-radius:2px;
  margin-left:7px;
  vertical-align:middle;
}
.winner-tag-a { background:#d4001a; color:#fff; }
.winner-tag-b { background:#0055d4; color:#fff; }
.prob-pct {
  font-family:'Bebas Neue',sans-serif;
  font-size:24px;
  letter-spacing:1px;
}
.prob-bar-bg {
  height:10px;
  background:rgba(0,0,0,0.06);
  border-radius:5px;
  overflow:hidden;
}
.prob-bar {
  height:100%;
  border-radius:5px;
  width:0%;
  transition:width 0.9s cubic-bezier(.4,0,.2,1);
}
.bar-a { background:linear-gradient(90deg,#a00014,#ff3344); }
.bar-b { background:linear-gradient(90deg,#003a99,#0077ff); }
/* 스탯 비교 테이블 */
.stat-table {
  width:100%;
  border-collapse:collapse;
}
.stat-table th {
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;
  letter-spacing:2px;
  color:#aaa;
  padding:5px 8px;
  border-bottom:1px solid rgba(0,0,0,0.07);
  text-align:center;
}
.stat-table th:first-child { text-align:left; }
.stat-table td {
  padding:5px 8px;
  border-bottom:1px solid rgba(0,0,0,0.04);
  text-align:center;
  font-weight:700;
  letter-spacing:1px;
  font-size:13px;
  color:#1a1a1a;
}
.stat-table td:first-child {
  text-align:left;
  color:#999;
  font-size:11px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
}
.td-win { color:#1a1a1a; font-family:'Bebas Neue',sans-serif; }
.td-lose { color:#ccc; }
.td-tie { color:#aaa; }
.td-adv-a { color:#d4001a; font-family:'Bebas Neue',sans-serif; font-size:11px; }
.td-adv-b { color:#0055d4; font-family:'Bebas Neue',sans-serif; font-size:11px; }
.td-adv-tie { color:#ccc; font-family:'Bebas Neue',sans-serif; font-size:11px; }

/* ===== 애니메이션 오버레이 (vs-container 내부) ===== */
#animOverlay {
  display:none;
  position:absolute;
  inset:0;
  z-index:10;
  pointer-events:none;
  overflow:hidden;
  border-radius:8px;
}

/* --- FLASH --- */
@keyframes flashSeq {
  0%   { background:rgba(212,0,26,0.7); }
  20%  { background:rgba(0,85,212,0.7); }
  40%  { background:rgba(212,0,26,0.8); }
  60%  { background:rgba(0,85,212,0.8); }
  80%  { background:rgba(212,0,26,0.5); }
  100% { background:transparent; }
}
.anim-flash { animation:flashSeq 0.9s ease-out forwards; }

/* --- COUNTDOWN --- */
.anim-countdown-wrap {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.88);
}
.anim-countdown-num {
  font-family:'Bebas Neue',sans-serif;
  font-size:80px;
  letter-spacing:4px;
  line-height:1;
  color:#d4001a;
  text-shadow:0 0 20px rgba(212,0,26,0.9);
  animation:countPop 0.28s ease-out;
}
@keyframes countPop {
  0%   { transform:scale(2.5); opacity:0; }
  60%  { transform:scale(0.92); opacity:1; }
  100% { transform:scale(1); opacity:1; }
}
.anim-fight-text {
  font-family:'Bebas Neue',sans-serif;
  font-size:44px;
  letter-spacing:8px;
  color:#fff;
  text-shadow:0 0 20px rgba(255,255,255,0.8);
  animation:fightPop 0.3s ease-out;
}
@keyframes fightPop {
  0%   { transform:scaleX(0.2); opacity:0; }
  100% { transform:scaleX(1); opacity:1; }
}

/* --- GLITCH --- */
.anim-glitch-wrap {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.92);
}
.glitch-text {
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;
  letter-spacing:4px;
  color:#fff;
  position:relative;
  animation:glitchMain 0.9s steps(1) forwards;
  text-align:center;
  padding:0 8px;
}
.glitch-text::before, .glitch-text::after {
  content:attr(data-text);
  position:absolute;
  left:0; top:0;
}
.glitch-text::before {
  color:#ff0033;
  animation:glitchL 0.9s steps(1) forwards;
  clip-path:polygon(0 30%,100% 30%,100% 55%,0 55%);
}
.glitch-text::after {
  color:#0066ff;
  animation:glitchR 0.9s steps(1) forwards;
  clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%);
}
@keyframes glitchMain {
  0%,10%  { transform:skewX(0deg); opacity:1; }
  15%     { transform:skewX(-8deg); opacity:0.8; }
  20%     { transform:skewX(6deg); opacity:1; }
  30%     { transform:skewX(-4deg); }
  40%,100%{ transform:skewX(0deg); opacity:1; }
}
@keyframes glitchL {
  0%,9%  { transform:translate(0); }
  10%    { transform:translate(-8px,2px); }
  20%    { transform:translate(6px,-2px); }
  30%    { transform:translate(-4px,1px); }
  40%,100%{ transform:translate(0); }
}
@keyframes glitchR {
  0%,14% { transform:translate(0); }
  15%    { transform:translate(8px,-2px); }
  25%    { transform:translate(-5px,3px); }
  35%    { transform:translate(3px,-1px); }
  40%,100%{ transform:translate(0); }
}

/* --- CLASH --- */
.anim-clash-wrap {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.clash-side {
  position:absolute;
  top:0; bottom:0;
  width:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.clash-side-a {
  left:0;
  background:linear-gradient(135deg,#6a0010,#d4001a);
  animation:clashA 0.9s cubic-bezier(.22,1,.36,1) forwards;
}
.clash-side-b {
  right:0;
  background:linear-gradient(225deg,#003a99,#0077ff);
  animation:clashB 0.9s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes clashA {
  0%   { transform:translateX(-100%); }
  55%  { transform:translateX(8%); }
  70%  { transform:translateX(-3%); }
  85%  { transform:translateX(2%); }
  100% { transform:translateX(0%); }
}
@keyframes clashB {
  0%   { transform:translateX(100%); }
  55%  { transform:translateX(-8%); }
  70%  { transform:translateX(3%); }
  85%  { transform:translateX(-2%); }
  100% { transform:translateX(0%); }
}
.clash-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;
  letter-spacing:2px;
  color:#fff;
  text-shadow:0 0 12px rgba(255,255,255,0.6);
  padding:0 8px;
  text-align:center;
  word-break:break-word;
}
.clash-vs {
  position:absolute;
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;
  color:#fff;
  letter-spacing:4px;
  text-shadow:0 0 20px rgba(255,255,255,0.9), 0 0 40px rgba(255,200,0,0.6);
  z-index:2;
  animation:clashVS 0.9s ease-out forwards;
}
@keyframes clashVS {
  0%   { transform:scale(0); opacity:0; }
  60%  { transform:scale(1.4); opacity:1; }
  100% { transform:scale(1); opacity:1; }
}

/* --- THUNDER --- */
.anim-thunder-wrap {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.93);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:8px;
}
.thunder-bolt {
  font-size:56px;
  animation:thunderAnim 0.9s steps(1) forwards;
}
@keyframes thunderAnim {
  0%,100% { opacity:1; transform:scale(1); filter:drop-shadow(0 0 0px #fff); }
  10%  { opacity:0; }
  15%  { opacity:1; transform:scale(1.3); filter:drop-shadow(0 0 40px #fff) drop-shadow(0 0 80px #ffe066); }
  25%  { opacity:0; }
  30%  { opacity:1; transform:scale(0.95); filter:drop-shadow(0 0 20px #ffe066); }
  45%  { opacity:0; }
  50%  { opacity:1; transform:scale(1.15); filter:drop-shadow(0 0 60px #fff); }
  65%  { opacity:1; filter:drop-shadow(0 0 10px #ffe066); }
  80%  { opacity:0.7; transform:scale(1); }
}
.thunder-label {
  font-family:'Bebas Neue',sans-serif;
  font-size:16px;
  letter-spacing:6px;
  color:#ffe066;
  text-shadow:0 0 12px rgba(255,224,102,0.9);
  animation:thunderLabel 0.9s ease-out forwards;
}
@keyframes thunderLabel {
  0%  { opacity:0; transform:scaleX(2); }
  40% { opacity:1; transform:scaleX(1); }
  100%{ opacity:1; }
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-nav">
    <a href="/">⌂ HOME</a>
    <a href="/mma-stat.html">← STAT</a>
  </div>
  <h1>WINNER PREDICTION</h1>
  <div style="width:80px"></div>
</div>

<div class="section-label">저장된 카드 — 드래그 또는 A·B 버튼으로 선택</div>
<div id="cardPool" class="card-pool"></div>

<div class="anim-bar">
  <label>EFFECT</label>
  <select id="animSelect" class="anim-select">
    <option value="clash">⚡ CLASH — 카드 충돌</option>
    <option value="countdown">🔢 COUNTDOWN — 3·2·1·FIGHT</option>
    <option value="flash">💥 FLASH — 빨강·파랑 번쩍</option>
    <option value="glitch">👾 GLITCH — 텍스트 글리치</option>
    <option value="thunder">🌩 THUNDER — 번개</option>
  </select>
  <button class="btn-reset" onclick="resetAll()">RESET</button>
</div>

<div class="section-label">VS</div>
<div class="vs-container" id="vsContainer">
  <!-- 애니메이션 오버레이 (vs-container 내부) -->
  <div id="animOverlay"></div>
  <div id="zoneA" class="drop-zone">
    <div class="zone-label">FIGHTER A</div>
    <div class="zone-placeholder">카드를 여기에<br>드래그하세요</div>
  </div>
  <div class="vs-badge">VS</div>
  <div id="zoneB" class="drop-zone">
    <div class="zone-label">FIGHTER B</div>
    <div class="zone-placeholder">카드를 여기에<br>드래그하세요</div>
  </div>
</div>

<div id="result" class="result-section" style="display:none">
  <div class="result-header">PREDICTION RESULT</div>
  <div class="result-body">
    <div class="prob-row" id="probRowA"></div>
    <div class="prob-row" id="probRowB"></div>
    <table class="stat-table">
      <thead>
        <tr>
          <th>STAT</th>
          <th id="thA" style="color:#d4001a">A</th>
          <th id="thB" style="color:#0055d4">B</th>
          <th>우위</th>
        </tr>
      </thead>
      <tbody id="statBody"></tbody>
    </table>
  </div>
</div>

<script>
var slotA = null, slotB = null;

var WEIGHTS = {
  fightiq:1.3, striking:1.2, wrestling:1.1,
  jiujitsu:1.0, chin:1.2, cardio:1.0,
  speed:0.9, power:1.0,
  micwork:0.3, aura:0.5
};
var STAT_LABELS = {
  fightiq:'Fight IQ', striking:'Striking', wrestling:'Wrestling',
  jiujitsu:'Jiu-Jitsu', chin:'Chin', cardio:'Cardio',
  speed:'Speed', power:'Power', micwork:'Mic Work', aura:'Aura'
};

function getCards() {
  return JSON.parse(localStorage.getItem('mma_cards') || '[]');
}

function calcScore(card) {
  var all = Object.assign({}, card.stats || {}, card.extra || {});
  var score = 0;
  Object.keys(WEIGHTS).forEach(function(k) {
    score += (all[k] || 0) * WEIGHTS[k];
  });
  return score;
}

function calcProb(cardA, cardB) {
  var sA = calcScore(cardA);
  var sB = calcScore(cardB);
  var pA = sA * sA;
  var pB = sB * sB;
  var total = pA + pB;
  var a = Math.round(pA / total * 100);
  return { a: a, b: 100 - a };
}

function resetAll() {
  slotA = null; slotB = null;
  renderZone('A'); renderZone('B');
  document.getElementById('result').style.display = 'none';
}

function renderPool() {
  var pool = document.getElementById('cardPool');
  var cards = getCards();
  pool.innerHTML = '';
  if (cards.length === 0) {
    pool.innerHTML = '<div class="no-cards-msg">저장된 카드가 없습니다<br>← STAT 생성기에서 카드를 먼저 만들어주세요</div>';
    return;
  }
  cards.forEach(function(card) {
    var el = document.createElement('div');
    el.className = 'pool-card';
    el.draggable = true;
    el.dataset.id = card.id;
    el.innerHTML =
      '<img src="' + card.image + '" alt="' + card.name + '">' +
      '<div class="card-name">' + card.name + '</div>' +
      '<div class="slot-btns">' +
        '<button class="slot-btn slot-btn-a">A</button>' +
        '<button class="slot-btn slot-btn-b">B</button>' +
      '</div>';
    el.querySelector('.slot-btn-a').addEventListener('click', function() { placeCard(card.id, 'A'); });
    el.querySelector('.slot-btn-b').addEventListener('click', function() { placeCard(card.id, 'B'); });
    el.addEventListener('dragstart', function(e) {
      e.dataTransfer.setData('cardId', card.id);
      e.dataTransfer.effectAllowed = 'move';
    });
    pool.appendChild(el);
  });
}

function placeCard(cardId, slot) {
  var cards = getCards();
  var card = cards.find(function(c) { return c.id === cardId; });
  if (!card) return;
  if (slot === 'A') slotA = card;
  else slotB = card;
  renderZone(slot);
  if (slotA && slotB) {
    var effect = document.getElementById('animSelect').value;
    playAnimation(effect, function() { renderResult(); });
  } else {
    document.getElementById('result').style.display = 'none';
  }
}

function renderZone(slot) {
  var card = slot === 'A' ? slotA : slotB;
  var zone = document.getElementById('zone' + slot);
  if (!card) {
    zone.className = 'drop-zone';
    zone.innerHTML =
      '<div class="zone-label">FIGHTER ' + slot + '</div>' +
      '<div class="zone-placeholder">카드를 여기에<br>드래그하세요</div>';
    return;
  }
  var all = Object.assign({}, card.stats || {}, card.extra || {});
  var topStats = Object.keys(WEIGHTS)
    .sort(function(a,b){ return (all[b]||0)-(all[a]||0); })
    .slice(0,3)
    .map(function(k){ return STAT_LABELS[k]+' '+( all[k]||0); });
  var score = Math.round(calcScore(card));
  zone.className = 'drop-zone ' + (slot === 'A' ? 'filled' : 'filled-b');
  zone.innerHTML =
    '<button class="zone-clear" onclick="clearSlot(\'' + slot + '\')">✕</button>' +
    '<div class="zone-fighter-name zone-fighter-name-' + slot.toLowerCase() + '">' + card.name + '</div>' +
    '<div class="zone-fighter-score">SCORE ' + score + '</div>' +
    '<div class="zone-fighter-tags">' +
      topStats.map(function(s){ return '<span class="zone-tag">'+s+'</span>'; }).join('') +
    '</div>';
}

function clearSlot(slot) {
  if (slot === 'A') slotA = null;
  else slotB = null;
  renderZone(slot);
  document.getElementById('result').style.display = 'none';
}

/* ===== 애니메이션 ===== */
function playAnimation(effect, done) {
  var overlay = document.getElementById('animOverlay');
  overlay.innerHTML = '';
  overlay.style.display = 'block';
  overlay.className = '';

  if (effect === 'flash') {
    overlay.classList.add('anim-flash');
    setTimeout(function() {
      overlay.style.display = 'none';
      done();
    }, 900);

  } else if (effect === 'countdown') {
    var wrap = document.createElement('div');
    wrap.className = 'anim-countdown-wrap';
    overlay.appendChild(wrap);
    var nums = ['3','2','1'];
    var i = 0;
    function showNum() {
      wrap.innerHTML = '<div class="anim-countdown-num">' + nums[i] + '</div>';
      i++;
      if (i < nums.length) {
        setTimeout(showNum, 280);
      } else {
        setTimeout(function() {
          wrap.innerHTML = '<div class="anim-fight-text">FIGHT</div>';
          setTimeout(function() {
            overlay.style.display = 'none';
            done();
          }, 350);
        }, 280);
      }
    }
    showNum();

  } else if (effect === 'glitch') {
    var wrap = document.createElement('div');
    wrap.className = 'anim-glitch-wrap';
    var nameA = slotA ? slotA.name.split(' ')[0] : 'A';
    var nameB = slotB ? slotB.name.split(' ')[0] : 'B';
    wrap.innerHTML =
      '<div class="glitch-text" data-text="' + nameA + ' VS ' + nameB + '">' +
        nameA + ' VS ' + nameB +
      '</div>';
    overlay.appendChild(wrap);
    setTimeout(function() {
      overlay.style.display = 'none';
      done();
    }, 1000);

  } else if (effect === 'clash') {
    var wrap = document.createElement('div');
    wrap.className = 'anim-clash-wrap';
    var nameA = slotA ? slotA.name : 'A';
    var nameB = slotB ? slotB.name : 'B';
    wrap.innerHTML =
      '<div class="clash-side clash-side-a"><div class="clash-name">' + nameA + '</div></div>' +
      '<div class="clash-side clash-side-b"><div class="clash-name">' + nameB + '</div></div>' +
      '<div class="clash-vs">VS</div>';
    overlay.appendChild(wrap);
    setTimeout(function() {
      overlay.style.display = 'none';
      done();
    }, 1000);

  } else if (effect === 'thunder') {
    var wrap = document.createElement('div');
    wrap.className = 'anim-thunder-wrap';
    wrap.innerHTML =
      '<div class="thunder-bolt">⚡</div>' +
      '<div class="thunder-label">FIGHT NIGHT</div>';
    overlay.appendChild(wrap);
    setTimeout(function() {
      overlay.style.display = 'none';
      done();
    }, 1000);
  } else {
    done();
  }
}

function renderResult() {
  var prob = calcProb(slotA, slotB);
  var winSlot = prob.a >= prob.b ? 'A' : 'B';

  document.getElementById('probRowA').innerHTML =
    '<div class="prob-fighter">' +
      '<div>' +
        '<span class="prob-name">' + slotA.name + '</span>' +
        (winSlot === 'A' ? '<span class="winner-tag winner-tag-a">WINNER</span>' : '') +
      '</div>' +
      '<span class="prob-pct" style="color:#d4001a">' + prob.a + '%</span>' +
    '</div>' +
    '<div class="prob-bar-bg"><div class="prob-bar bar-a" id="barA" style="width:0%"></div></div>';

  document.getElementById('probRowB').innerHTML =
    '<div class="prob-fighter">' +
      '<div>' +
        '<span class="prob-name">' + slotB.name + '</span>' +
        (winSlot === 'B' ? '<span class="winner-tag winner-tag-b">WINNER</span>' : '') +
      '</div>' +
      '<span class="prob-pct" style="color:#0055d4">' + prob.b + '%</span>' +
    '</div>' +
    '<div class="prob-bar-bg"><div class="prob-bar bar-b" id="barB" style="width:0%"></div></div>';

  var nameA = slotA.name.split(' ')[0];
  var nameB = slotB.name.split(' ')[0];
  document.getElementById('thA').textContent = nameA;
  document.getElementById('thB').textContent = nameB;

  var tbody = document.getElementById('statBody');
  tbody.innerHTML = '';
  var allA = Object.assign({}, slotA.stats || {}, slotA.extra || {});
  var allB = Object.assign({}, slotB.stats || {}, slotB.extra || {});

  Object.keys(STAT_LABELS).forEach(function(k) {
    var vA = allA[k] || 0;
    var vB = allB[k] || 0;
    var advClass, advText;
    if (vA > vB)      { advClass = 'td-adv-a'; advText = 'A +' + (vA - vB); }
    else if (vB > vA) { advClass = 'td-adv-b'; advText = 'B +' + (vB - vA); }
    else              { advClass = 'td-adv-tie'; advText = '—'; }
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + STAT_LABELS[k] + '</td>' +
      '<td class="' + (vA > vB ? 'td-win' : vA < vB ? 'td-lose' : 'td-tie') + '">' + vA + '</td>' +
      '<td class="' + (vB > vA ? 'td-win' : vB < vA ? 'td-lose' : 'td-tie') + '">' + vB + '</td>' +
      '<td class="' + advClass + '">' + advText + '</td>';
    tbody.appendChild(tr);
  });

  var result = document.getElementById('result');
  result.style.display = 'block';

  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      var bA = document.getElementById('barA');
      var bB = document.getElementById('barB');
      if (bA) bA.style.width = prob.a + '%';
      if (bB) bB.style.width = prob.b + '%';
    });
  });

  setTimeout(function() { result.scrollIntoView({behavior:'smooth'}); }, 120);
}

var vsContainer = document.getElementById('vsContainer');
vsContainer.addEventListener('dragover', function(e) {
  var zone = e.target.closest('.drop-zone');
  if (zone) { e.preventDefault(); zone.classList.add('drag-over'); }
});
vsContainer.addEventListener('dragleave', function(e) {
  var zone = e.target.closest('.drop-zone');
  if (zone && !zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
});
vsContainer.addEventListener('drop', function(e) {
  var zone = e.target.closest('.drop-zone');
  if (!zone) return;
  e.preventDefault();
  zone.classList.remove('drag-over');
  var cardId = e.dataTransfer.getData('cardId');
  var slot = zone.id === 'zoneA' ? 'A' : 'B';
  placeCard(cardId, slot);
});

window.onload = function() { renderPool(); };
</script>
