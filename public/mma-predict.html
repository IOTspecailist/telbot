<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMA Winner Prediction</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#111;
  color:#fff;
  font-family:'Barlow Condensed',sans-serif;
  padding:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  min-height:100vh;
}
.top-bar {
  width:100%;
  max-width:480px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.top-bar a {
  font-size:12px;
  color:#888;
  text-decoration:none;
  letter-spacing:1px;
  font-weight:700;
}
.top-bar a:hover { color:#d4001a; }
.top-bar h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;
  letter-spacing:4px;
  color:#d4001a;
}
.section-label {
  width:100%;
  max-width:480px;
  font-family:'Bebas Neue',sans-serif;
  font-size:12px;
  color:#d4001a;
  letter-spacing:3px;
  border-bottom:1px solid rgba(212,0,26,0.3);
  padding-bottom:6px;
}
/* 카드 풀 */
.card-pool {
  width:100%;
  max-width:480px;
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding-bottom:6px;
}
.card-pool::-webkit-scrollbar { height:3px; }
.card-pool::-webkit-scrollbar-thumb { background:#d4001a; border-radius:2px; }
.pool-card {
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  cursor:grab;
}
.pool-card img {
  width:80px;
  height:109px;
  border-radius:3px;
  border:2px solid rgba(255,255,255,0.08);
  display:block;
  pointer-events:none;
}
.pool-card:hover img { border-color:rgba(212,0,26,0.6); }
.pool-card .card-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:10px;
  color:#bbb;
  letter-spacing:1px;
  text-align:center;
  max-width:80px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.slot-btns { display:flex; gap:4px; }
.slot-btn {
  padding:2px 8px;
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;
  letter-spacing:1px;
  border:none;
  border-radius:2px;
  cursor:pointer;
}
.slot-btn-a { background:#d4001a; color:#fff; }
.slot-btn-b { background:#0055d4; color:#fff; }
.slot-btn:hover { opacity:0.8; }
.no-cards-msg {
  font-size:12px;
  color:#444;
  font-weight:700;
  letter-spacing:1px;
  padding:20px 0;
  text-align:center;
  width:100%;
  line-height:1.8;
}
/* VS 구역 */
.vs-container {
  width:100%;
  max-width:480px;
  display:flex;
  align-items:stretch;
  gap:10px;
}
.drop-zone {
  flex:1;
  min-height:170px;
  border:2px dashed rgba(255,255,255,0.12);
  border-radius:6px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:12px;
  transition:border-color 0.2s, background 0.2s;
  position:relative;
}
.drop-zone.drag-over {
  border-color:#d4001a;
  background:rgba(212,0,26,0.06);
}
.drop-zone.filled {
  border-style:solid;
  border-color:rgba(212,0,26,0.35);
  justify-content:flex-start;
  padding:8px;
}
.drop-zone.filled-b {
  border-style:solid;
  border-color:rgba(0,85,212,0.45);
  justify-content:flex-start;
  padding:8px;
}
.zone-label {
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;
  letter-spacing:3px;
  color:#555;
}
.zone-placeholder {
  font-size:11px;
  color:#3a3a3a;
  text-align:center;
  line-height:1.7;
  font-weight:700;
  letter-spacing:1px;
}
.zone-card-img {
  width:100%;
  border-radius:3px;
  display:block;
}
.zone-card-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;
  letter-spacing:2px;
  text-align:center;
  color:#fff;
  margin-top:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
}
.zone-clear {
  position:absolute;
  top:6px; right:6px;
  background:rgba(0,0,0,0.7);
  border:none; color:#666;
  font-size:11px;
  width:20px; height:20px;
  border-radius:3px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}
.zone-clear:hover { color:#fff; }
.vs-badge {
  font-family:'Bebas Neue',sans-serif;
  font-size:30px;
  color:#d4001a;
  letter-spacing:2px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  text-shadow:0 0 16px rgba(212,0,26,0.5);
}
/* 결과 */
.result-section {
  width:100%;
  max-width:480px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(212,0,26,0.3);
  border-radius:6px;
  overflow:hidden;
}
.result-header {
  background:linear-gradient(90deg,#d4001a,#8a0010);
  padding:10px 16px;
  font-family:'Bebas Neue',sans-serif;
  font-size:14px;
  letter-spacing:4px;
}
.result-body {
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:16px;
}
.prob-row { display:flex; flex-direction:column; gap:6px; }
.prob-fighter {
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.prob-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;
  letter-spacing:2px;
}
.winner-tag {
  display:inline-block;
  font-family:'Bebas Neue',sans-serif;
  font-size:10px;
  letter-spacing:2px;
  padding:2px 7px;
  border-radius:2px;
  margin-left:7px;
  vertical-align:middle;
}
.winner-tag-a { background:#d4001a; color:#fff; }
.winner-tag-b { background:#0055d4; color:#fff; }
.prob-pct {
  font-family:'Bebas Neue',sans-serif;
  font-size:24px;
  letter-spacing:1px;
}
.prob-bar-bg {
  height:10px;
  background:rgba(255,255,255,0.06);
  border-radius:5px;
  overflow:hidden;
}
.prob-bar {
  height:100%;
  border-radius:5px;
  width:0%;
  transition:width 0.9s cubic-bezier(.4,0,.2,1);
}
.bar-a { background:linear-gradient(90deg,#a00014,#ff3344); }
.bar-b { background:linear-gradient(90deg,#003a99,#0077ff); }
/* 스탯 비교 테이블 */
.stat-table {
  width:100%;
  border-collapse:collapse;
}
.stat-table th {
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;
  letter-spacing:2px;
  color:#666;
  padding:5px 8px;
  border-bottom:1px solid rgba(255,255,255,0.07);
  text-align:center;
}
.stat-table th:first-child { text-align:left; }
.stat-table td {
  padding:5px 8px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  text-align:center;
  font-weight:700;
  letter-spacing:1px;
  font-size:13px;
}
.stat-table td:first-child {
  text-align:left;
  color:#888;
  font-size:11px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
}
.td-win { color:#fff; font-family:'Bebas Neue',sans-serif; }
.td-lose { color:#3a3a3a; }
.td-tie { color:#666; }
.td-adv-a { color:#ff3344; font-family:'Bebas Neue',sans-serif; font-size:11px; }
.td-adv-b { color:#0077ff; font-family:'Bebas Neue',sans-serif; font-size:11px; }
.td-adv-tie { color:#444; font-family:'Bebas Neue',sans-serif; font-size:11px; }
</style>
</head>
<body>

<div class="top-bar">
  <a href="/mma-stat.html">← STAT 생성기</a>
  <h1>WINNER PREDICTION</h1>
  <div style="width:80px"></div>
</div>

<div class="section-label">저장된 카드 — 드래그 또는 A·B 버튼으로 선택</div>
<div id="cardPool" class="card-pool"></div>

<div class="section-label">VS</div>
<div class="vs-container" id="vsContainer">
  <div id="zoneA" class="drop-zone">
    <div class="zone-label">FIGHTER A</div>
    <div class="zone-placeholder">카드를 여기에<br>드래그하세요</div>
  </div>
  <div class="vs-badge">VS</div>
  <div id="zoneB" class="drop-zone">
    <div class="zone-label">FIGHTER B</div>
    <div class="zone-placeholder">카드를 여기에<br>드래그하세요</div>
  </div>
</div>

<div id="result" class="result-section" style="display:none">
  <div class="result-header">PREDICTION RESULT</div>
  <div class="result-body">
    <div class="prob-row" id="probRowA"></div>
    <div class="prob-row" id="probRowB"></div>
    <table class="stat-table">
      <thead>
        <tr>
          <th>STAT</th>
          <th id="thA" style="color:#ff3344">A</th>
          <th id="thB" style="color:#0077ff">B</th>
          <th>우위</th>
        </tr>
      </thead>
      <tbody id="statBody"></tbody>
    </table>
  </div>
</div>

<script>
var slotA = null, slotB = null;

var WEIGHTS = {
  fightiq:1.3, striking:1.2, wrestling:1.1,
  jiujitsu:1.0, chin:1.2, cardio:1.0,
  speed:0.9, power:1.0,
  micwork:0.3, aura:0.5
};
var STAT_LABELS = {
  fightiq:'Fight IQ', striking:'Striking', wrestling:'Wrestling',
  jiujitsu:'Jiu-Jitsu', chin:'Chin', cardio:'Cardio',
  speed:'Speed', power:'Power', micwork:'Mic Work', aura:'Aura'
};

function getCards() {
  return JSON.parse(localStorage.getItem('mma_cards') || '[]');
}

function calcScore(card) {
  var all = Object.assign({}, card.stats || {}, card.extra || {});
  var score = 0;
  Object.keys(WEIGHTS).forEach(function(k) {
    score += (all[k] || 0) * WEIGHTS[k];
  });
  return score;
}

function calcProb(cardA, cardB) {
  var sA = calcScore(cardA);
  var sB = calcScore(cardB);
  var pA = sA * sA;
  var pB = sB * sB;
  var total = pA + pB;
  var a = Math.round(pA / total * 100);
  return { a: a, b: 100 - a };
}

function renderPool() {
  var pool = document.getElementById('cardPool');
  var cards = getCards();
  pool.innerHTML = '';
  if (cards.length === 0) {
    pool.innerHTML = '<div class="no-cards-msg">저장된 카드가 없습니다<br>← STAT 생성기에서 카드를 먼저 만들어주세요</div>';
    return;
  }
  cards.forEach(function(card) {
    var el = document.createElement('div');
    el.className = 'pool-card';
    el.draggable = true;
    el.dataset.id = card.id;
    el.innerHTML =
      '<img src="' + card.image + '" alt="' + card.name + '">' +
      '<div class="card-name">' + card.name + '</div>' +
      '<div class="slot-btns">' +
        '<button class="slot-btn slot-btn-a">A</button>' +
        '<button class="slot-btn slot-btn-b">B</button>' +
      '</div>';
    el.querySelector('.slot-btn-a').addEventListener('click', function() { placeCard(card.id, 'A'); });
    el.querySelector('.slot-btn-b').addEventListener('click', function() { placeCard(card.id, 'B'); });
    el.addEventListener('dragstart', function(e) {
      e.dataTransfer.setData('cardId', card.id);
      e.dataTransfer.effectAllowed = 'move';
    });
    pool.appendChild(el);
  });
}

function placeCard(cardId, slot) {
  var cards = getCards();
  var card = cards.find(function(c) { return c.id === cardId; });
  if (!card) return;
  if (slot === 'A') slotA = card;
  else slotB = card;
  renderZone(slot);
  if (slotA && slotB) {
    setTimeout(renderResult, 80);
  } else {
    document.getElementById('result').style.display = 'none';
  }
}

function renderZone(slot) {
  var card = slot === 'A' ? slotA : slotB;
  var zone = document.getElementById('zone' + slot);
  if (!card) {
    zone.className = 'drop-zone';
    zone.innerHTML =
      '<div class="zone-label">FIGHTER ' + slot + '</div>' +
      '<div class="zone-placeholder">카드를 여기에<br>드래그하세요</div>';
    return;
  }
  zone.className = 'drop-zone ' + (slot === 'A' ? 'filled' : 'filled-b');
  zone.innerHTML =
    '<button class="zone-clear" onclick="clearSlot(\'' + slot + '\')">✕</button>' +
    '<img class="zone-card-img" src="' + card.image + '" alt="' + card.name + '">' +
    '<div class="zone-card-name">' + card.name + '</div>';
}

function clearSlot(slot) {
  if (slot === 'A') slotA = null;
  else slotB = null;
  renderZone(slot);
  document.getElementById('result').style.display = 'none';
}

function renderResult() {
  var prob = calcProb(slotA, slotB);
  var winSlot = prob.a >= prob.b ? 'A' : 'B';

  // Row A
  document.getElementById('probRowA').innerHTML =
    '<div class="prob-fighter">' +
      '<div>' +
        '<span class="prob-name">' + slotA.name + '</span>' +
        (winSlot === 'A' ? '<span class="winner-tag winner-tag-a">WINNER</span>' : '') +
      '</div>' +
      '<span class="prob-pct" style="color:#ff3344">' + prob.a + '%</span>' +
    '</div>' +
    '<div class="prob-bar-bg"><div class="prob-bar bar-a" id="barA" style="width:0%"></div></div>';

  // Row B
  document.getElementById('probRowB').innerHTML =
    '<div class="prob-fighter">' +
      '<div>' +
        '<span class="prob-name">' + slotB.name + '</span>' +
        (winSlot === 'B' ? '<span class="winner-tag winner-tag-b">WINNER</span>' : '') +
      '</div>' +
      '<span class="prob-pct" style="color:#0077ff">' + prob.b + '%</span>' +
    '</div>' +
    '<div class="prob-bar-bg"><div class="prob-bar bar-b" id="barB" style="width:0%"></div></div>';

  // 헤더
  var nameA = slotA.name.split(' ')[0];
  var nameB = slotB.name.split(' ')[0];
  document.getElementById('thA').textContent = nameA;
  document.getElementById('thB').textContent = nameB;

  // 스탯 테이블
  var tbody = document.getElementById('statBody');
  tbody.innerHTML = '';
  var allA = Object.assign({}, slotA.stats || {}, slotA.extra || {});
  var allB = Object.assign({}, slotB.stats || {}, slotB.extra || {});

  Object.keys(STAT_LABELS).forEach(function(k) {
    var vA = allA[k] || 0;
    var vB = allB[k] || 0;
    var advClass, advText;
    if (vA > vB)      { advClass = 'td-adv-a'; advText = 'A +' + (vA - vB); }
    else if (vB > vA) { advClass = 'td-adv-b'; advText = 'B +' + (vB - vA); }
    else              { advClass = 'td-adv-tie'; advText = '—'; }
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + STAT_LABELS[k] + '</td>' +
      '<td class="' + (vA > vB ? 'td-win' : vA < vB ? 'td-lose' : 'td-tie') + '">' + vA + '</td>' +
      '<td class="' + (vB > vA ? 'td-win' : vB < vA ? 'td-lose' : 'td-tie') + '">' + vB + '</td>' +
      '<td class="' + advClass + '">' + advText + '</td>';
    tbody.appendChild(tr);
  });

  var result = document.getElementById('result');
  result.style.display = 'block';

  // 바 애니메이션
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      var bA = document.getElementById('barA');
      var bB = document.getElementById('barB');
      if (bA) bA.style.width = prob.a + '%';
      if (bB) bB.style.width = prob.b + '%';
    });
  });

  setTimeout(function() { result.scrollIntoView({behavior:'smooth'}); }, 120);
}

// 드래그앤드롭 — 이벤트 위임으로 innerHTML 교체 후에도 작동
var vsContainer = document.getElementById('vsContainer');
vsContainer.addEventListener('dragover', function(e) {
  var zone = e.target.closest('.drop-zone');
  if (zone) { e.preventDefault(); zone.classList.add('drag-over'); }
});
vsContainer.addEventListener('dragleave', function(e) {
  var zone = e.target.closest('.drop-zone');
  if (zone && !zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
});
vsContainer.addEventListener('drop', function(e) {
  var zone = e.target.closest('.drop-zone');
  if (!zone) return;
  e.preventDefault();
  zone.classList.remove('drag-over');
  var cardId = e.dataTransfer.getData('cardId');
  var slot = zone.id === 'zoneA' ? 'A' : 'B';
  placeCard(cardId, slot);
});

window.onload = function() {
  renderPool();
};
</script>

</body>
</html>
