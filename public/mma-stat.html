<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fighter Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#f2ede4;
  color:#1a1a1a;
  font-family:'Barlow Condensed',sans-serif;
  padding:16px;
  display:flex;
  justify-content:center;
  gap:16px;
  min-height:100vh;
  align-items:flex-start;
}

/* ─── 왼쪽 메인 컬럼 ─── */
.main-col {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  flex-shrink:0;
  width:420px;
}

/* ─── 오른쪽 카드 패널 ─── */
.cards-col {
  width:280px;
  flex-shrink:0;
  position:sticky;
  top:16px;
  max-height:calc(100vh - 32px);
  display:flex;
  flex-direction:column;
  gap:0;
  background:#fff;
  border:1px solid rgba(212,0,26,0.15);
  border-left:3px solid #d4001a;
  border-radius:4px;
  box-shadow:0 1px 6px rgba(0,0,0,0.06);
  overflow:hidden;
}
.panel {
  width:100%;
  background:#fff;
  border:1px solid rgba(212,0,26,0.15);
  border-left:3px solid #d4001a;
  border-radius:4px;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  box-shadow:0 1px 6px rgba(0,0,0,0.06);
}
.panel h2 {
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;
  color:#d4001a;
  letter-spacing:3px;
}
input[type=text] {
  width:100%;
  background:#fafafa;
  border:1px solid rgba(0,0,0,0.13);
  border-radius:3px;
  color:#1a1a1a;
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;
  letter-spacing:2px;
  padding:8px 12px;
  outline:none;
}
input[type=text]:focus { border-color:#d4001a; }
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.stat-item { display:flex; flex-direction:column; gap:3px; }
.stat-top { display:flex; justify-content:space-between; align-items:center; }
.stat-top span:first-child { font-size:11px; color:#999; text-transform:uppercase; letter-spacing:1px; font-weight:700; }
.stat-top .num { font-family:'Bebas Neue',sans-serif; font-size:18px; color:#d4001a; }
input[type=range] { width:100%; accent-color:#d4001a; }
.extra-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
canvas { width:100%; border-radius:4px; display:block; box-shadow:0 2px 12px rgba(0,0,0,0.15); }
.btn {
  width:100%;
  padding:14px;
  background:#d4001a;
  border:none;
  border-radius:4px;
  font-family:'Bebas Neue',sans-serif;
  font-size:16px;
  letter-spacing:3px;
  color:#fff;
  cursor:pointer;
}
.btn:hover { background:#b8001a; }
.hint {
  display:none;
  width:100%;
  padding:10px;
  text-align:center;
  font-size:13px;
  color:#d4001a;
  background:rgba(212,0,26,0.06);
  border:1px solid rgba(212,0,26,0.25);
  border-radius:4px;
  font-weight:700;
  letter-spacing:1px;
}
#outImg {
  display:none;
  width:100%;
  border-radius:4px;
}
.btn-secondary {
  width:100%;
  padding:11px;
  background:#fff;
  border:1px solid rgba(0,0,0,0.15);
  border-radius:4px;
  font-family:'Bebas Neue',sans-serif;
  font-size:14px;
  letter-spacing:3px;
  color:#888;
  cursor:pointer;
}
.btn-secondary:hover { border-color:#d4001a; color:#d4001a; }
.saved-section {
  display:none; /* 모바일에서만 사용 */
}
/* 오른쪽 카드 패널 헤더 */
.cards-col-header {
  padding:10px 12px 8px;
  border-bottom:1px solid rgba(212,0,26,0.12);
  flex-shrink:0;
}
.cards-col-header-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}
.cards-col-header-top span {
  font-family:'Bebas Neue',sans-serif;
  font-size:12px;
  color:#d4001a;
  letter-spacing:2.5px;
}
.bulk-progress {
  display:none;
  padding:0 12px 6px;
  flex-shrink:0;
  border-bottom:1px solid rgba(0,0,0,0.06);
}
.bulk-bar-track {
  width:100%;
  height:3px;
  background:rgba(0,0,0,0.08);
  border-radius:2px;
  overflow:hidden;
  margin-bottom:4px;
}
.bulk-bar-fill {
  height:100%;
  background:#d4001a;
  border-radius:2px;
  transition:width 0.2s;
  width:0%;
}
.bulk-status-text {
  font-size:10px;
  color:#888;
  letter-spacing:0.5px;
  font-weight:700;
}
/* 카드 목록 스크롤 영역 */
.card-list {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:10px;
  overflow-y:auto;
  flex:1;
  align-content:flex-start;
  scrollbar-width:thin;
  scrollbar-color:rgba(212,0,26,0.3) transparent;
}
.card-list::-webkit-scrollbar { width:4px; }
.card-list::-webkit-scrollbar-track { background:transparent; }
.card-list::-webkit-scrollbar-thumb { background:rgba(212,0,26,0.3); border-radius:2px; }
.card-item {
  position:relative;
  cursor:grab;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
}
.card-item img {
  display:block;
  width:116px;
  height:158px;
  border-radius:3px;
  border:2px solid rgba(0,0,0,0.08);
  object-fit:cover;
}
.card-item:hover img { border-color:#d4001a; }
.card-item .card-name {
  font-family:'Bebas Neue',sans-serif;
  font-size:10px;
  color:#777;
  text-align:center;
  letter-spacing:1px;
  max-width:116px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.card-del {
  position:absolute;
  top:3px; right:3px;
  background:rgba(0,0,0,0.5);
  border:none; color:#ccc;
  font-size:10px;
  width:16px; height:16px;
  border-radius:2px;
  cursor:pointer;
  display:none;
  line-height:16px;
  text-align:center;
  padding:0;
}
.card-item:hover .card-del { display:block; }
.card-del:hover { color:#fff; background:rgba(212,0,26,0.8); }
.no-cards {
  font-size:12px;
  color:#bbb;
  font-weight:700;
  letter-spacing:1px;
  padding:8px 0;
}
.btn-bulk {
  padding:5px 10px;
  background:#fff;
  border:1px solid rgba(212,0,26,0.35);
  border-radius:3px;
  font-family:'Bebas Neue',sans-serif;
  font-size:10px;
  letter-spacing:1px;
  color:#d4001a;
  cursor:pointer;
  white-space:nowrap;
}
.btn-bulk:hover { background:#d4001a; color:#fff; }
.btn-bulk:disabled { background:#eee; color:#aaa; border-color:#ddd; cursor:default; }

/* 모바일 반응형 */
@media (max-width:780px) {
  body { flex-direction:column; align-items:center; padding:12px; }
  .main-col { width:100%; max-width:420px; }
  .cards-col {
    position:static;
    width:100%;
    max-width:420px;
    max-height:360px;
  }
  .saved-section { display:none; }
}
/* ===== 우측 사이드 네비게이션 ===== */
.side-nav {
  position:fixed;right:0;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;
  background:#fff;
  border-radius:6px 0 0 6px;overflow:hidden;z-index:200;
  box-shadow:-2px 0 12px rgba(0,0,0,0.12), inset 0 0 0 1px rgba(0,0,0,0.07);
}
.side-nav a {
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:13px 8px;font-family:'Bebas Neue',sans-serif;font-size:8px;
  letter-spacing:1.5px;color:#666;text-decoration:none;gap:5px;min-width:46px;
  border-left:2px solid transparent;transition:color 0.15s,background 0.15s;line-height:1;
}
.side-nav a:hover { color:#1a1a1a;background:rgba(0,0,0,0.04); }
.side-nav a.active { color:#d4001a;border-left-color:#d4001a;background:rgba(212,0,26,0.07); }
.side-nav-sep { height:1px;background:rgba(0,0,0,0.08); }
.side-nav-icon { font-size:15px;line-height:1; }
.btn-search {
  padding:8px 16px;
  background:#d4001a;
  border:none;
  border-radius:3px;
  font-family:'Bebas Neue',sans-serif;
  font-size:14px;
  letter-spacing:2px;
  color:#fff;
  cursor:pointer;
  white-space:nowrap;
}
.btn-search:hover { background:#b8001a; }
.btn-search:disabled { background:#888; cursor:not-allowed; }
.search-status {
  font-size:12px;
  color:#888;
  font-weight:700;
  letter-spacing:1px;
  padding:4px 0;
}
.search-status.error { color:#d4001a; }
select {
  width:100%;
  background:#fafafa;
  border:1px solid rgba(0,0,0,0.13);
  border-radius:3px;
  color:#1a1a1a;
  font-family:'Bebas Neue',sans-serif;
  font-size:16px;
  letter-spacing:1px;
  padding:8px 12px;
  outline:none;
  cursor:pointer;
}
select:focus { border-color:#d4001a; }
.stat-readonly {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:4px 0;
  border-bottom:1px solid rgba(0,0,0,0.05);
}
.stat-readonly span:first-child { font-size:11px;color:#999;text-transform:uppercase;letter-spacing:1px;font-weight:700; }
.stat-readonly .num { font-family:'Bebas Neue',sans-serif;font-size:18px;color:#d4001a; }
</style>
</head>
<body>

<nav class="side-nav">
  <a href="/" title="Home"><span class="side-nav-icon">⌂</span>HOME</a>
  <div class="side-nav-sep"></div>
  <a href="/mma-stat.html" class="active"><span class="side-nav-icon">◈</span>STAT</a>
  <a href="/mma-predict.html"><span class="side-nav-icon">⚔</span>PREDICT</a>
  <a href="/mma-fighter-db.html"><span class="side-nav-icon">🗂</span>DB</a>
  <a href="/mma-anim-demo.html"><span class="side-nav-icon">▶</span>DEMO</a>
</nav>

<!-- 왼쪽 메인 컬럼 -->
<div class="main-col">
  <div style="width:100%;display:flex;justify-content:space-between;align-items:center;">
    <a href="/" style="font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:#888;text-decoration:none;">⌂ HOME</a>
    <a href="/mma-predict.html" style="font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:#d4001a;text-decoration:none;">승자 예측 →</a>
  </div>

  <div class="panel">
    <h2>FIGHTER SEARCH</h2>
    <div style="display:flex;gap:10px;align-items:center;">
      <input type="text" id="nameInput" placeholder="FIGHTER NAME (e.g. Islam Makhachev)" style="flex:1;">
      <button class="btn-search" id="searchBtn">검색</button>
    </div>
    <div class="search-status" id="searchStatus" style="display:none;"></div>
  </div>

  <div class="panel" id="confirmPanel" style="display:none;">
    <h2>WEIGHT CLASS / YEAR</h2>
    <select id="weightClassSelect">
      <option value="Strawweight">Strawweight (115)</option>
      <option value="Flyweight">Flyweight (125)</option>
      <option value="Bantamweight">Bantamweight (135)</option>
      <option value="Featherweight">Featherweight (145)</option>
      <option value="Lightweight" selected>Lightweight (155)</option>
      <option value="Welterweight">Welterweight (170)</option>
      <option value="Middleweight">Middleweight (185)</option>
      <option value="Light Heavyweight">Light Heavyweight (205)</option>
      <option value="Heavyweight">Heavyweight (265)</option>
    </select>
    <input type="text" id="yearInput" value="2025" placeholder="YEAR" style="width:100%;color:#ffd700;text-align:center;margin-top:4px;">
  </div>

  <div class="panel">
    <h2>STATS — RADAR (AUTO)</h2>
    <div class="grid" id="statGrid"></div>
  </div>

  <div class="panel">
    <h2>EXTRA STATS — TABLE ONLY (1-10)</h2>
    <div class="extra-grid" id="extraGrid"></div>
  </div>

  <canvas id="canvas" width="480" height="650"></canvas>

  <button class="btn" id="createBtn">카드 생성</button>
  <button class="btn-secondary" id="saveBtn">IMAGE SAVE</button>

  <div class="hint" id="hint">아래 이미지를 길게 눌러서 저장하세요</div>
  <img id="outImg" alt="Fighter Profile">
</div>

<!-- 오른쪽 카드 패널 -->
<div class="cards-col">
  <div class="cards-col-header">
    <div class="cards-col-header-top">
      <span>저장된 카드</span>
      <button class="btn-bulk" id="bulkBtn">DB 일괄 생성</button>
    </div>
  </div>
  <div class="bulk-progress" id="bulkProgress">
    <div class="bulk-bar-track"><div class="bulk-bar-fill" id="bulkBarFill"></div></div>
    <div class="bulk-status-text" id="bulkStatusText"></div>
  </div>
  <div id="cardList" class="card-list">
    <span class="no-cards">아직 저장된 카드가 없습니다</span>
  </div>
</div>

<script>
var STATS = [
  {key:'fightiq',          label:'Fight IQ',    val:5},
  {key:'power',            label:'Power',       val:5},
  {key:'strikingOffense',  label:'타격성공',    val:5},
  {key:'wrestlingOffense', label:'레슬링성공',  val:5},
  {key:'wrestlingDefense', label:'레슬링방어',  val:5},
  {key:'strikingDefense',  label:'타격방어',    val:5},
  {key:'cardio',           label:'Cardio',      val:5},
  {key:'jiujitsu',         label:'서브미션',    val:5}
];

var EXTRA = [
  {key:'micwork',   label:'Mic Work',  val:7},
  {key:'aura',      label:'Aura',      val:8}
];

var _currentRawStats = null;
var _currentScores = null;

// 8개 스탯 — 시계방향 45° 간격, 12시(-90°)부터
var ANGLES = [0,1,2,3,4,5,6,7].map(function(i){ return -90 + 45*i; });

// 비선형 S커브: 5.5 기준 편차 제곱 — 극단(1·10)은 드라마틱, 중간(5)은 약하게
function curveR(val) {
  return (val - 1) / 9;
}
var _animId = null;
var _animT = 0;

function toRad(deg) { return deg * Math.PI / 180; }

function getTotal() {
  var sum = 0;
  STATS.forEach(function(s) { sum += s.val; });
  EXTRA.forEach(function(s) { sum += s.val; });
  return sum;
}

// Build radar stat display (readonly — values set by API)
var grid = document.getElementById('statGrid');
STATS.forEach(function(s) {
  var d = document.createElement('div');
  d.className = 'stat-item';
  d.dataset.key = s.key;
  d.innerHTML =
    '<div class="stat-top">' +
      '<span>' + s.label + '</span>' +
      '<span class="num" id="n_' + s.key + '">' + s.val + '</span>' +
    '</div>';
  grid.appendChild(d);
});

// Build extra sliders
var extraGrid = document.getElementById('extraGrid');
EXTRA.forEach(function(s) {
  var d = document.createElement('div');
  d.className = 'stat-item';
  d.dataset.key = s.key;
  d.innerHTML =
    '<div class="stat-top">' +
      '<span>' + s.label + '</span>' +
      '<span class="num" id="n_' + s.key + '">' + s.val + '</span>' +
    '</div>' +
    '<input type="range" min="1" max="10" value="' + s.val + '">';
  extraGrid.appendChild(d);
  d.querySelector('input').addEventListener('input', function(e) {
    s.val = parseInt(e.target.value);
    document.getElementById('n_' + s.key).textContent = s.val;
    redraw();
  });
});

document.getElementById('nameInput').addEventListener('input', redraw);
document.getElementById('yearInput').addEventListener('input', redraw);

// ── 검색 ──
document.getElementById('searchBtn').addEventListener('click', function() {
  var name = document.getElementById('nameInput').value.trim();
  if (!name) return;

  var btn = document.getElementById('searchBtn');
  var status = document.getElementById('searchStatus');
  btn.disabled = true;
  btn.textContent = '검색 중...';
  status.style.display = 'none';

  var slug = name.trim().toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  fetch('/api/ufc-fighters/' + encodeURIComponent(slug))
    .then(function(r) { return r.json().then(function(d) { return {ok: r.ok, data: d}; }); })
    .then(function(res) {
      if (!res.ok) {
        status.className = 'search-status error';
        status.innerHTML = res.data.notInDb
          ? '❌ DB에 없는 선수입니다 — <a href="/mma-fighter-db.html" style="color:#d4001a;">Fighter DB</a>에서 먼저 저장해주세요.'
          : (res.data.error || '오류가 발생했습니다.');
        status.style.display = 'block';
        return;
      }
      var d = res.data;
      _currentRawStats = d.raw;
      _currentScores = d.scores;

      // 스탯 반영
      var keyMap = {fightiq:'fightiq', power:'power', strikingOffense:'strikingOffense',
                    wrestlingOffense:'wrestlingOffense', wrestlingDefense:'wrestlingDefense',
                    strikingDefense:'strikingDefense', cardio:'cardio', jiujitsu:'jiujitsu'};
      STATS.forEach(function(s) {
        var v = d.scores[keyMap[s.key]];
        if (v !== undefined) {
          s.val = v;
          document.getElementById('n_' + s.key).textContent = v;
        }
      });

      // 체급 드롭다운 기본값
      var sel = document.getElementById('weightClassSelect');
      for (var i = 0; i < sel.options.length; i++) {
        if (sel.options[i].value === d.weightClass) { sel.selectedIndex = i; break; }
      }

      document.getElementById('confirmPanel').style.display = 'block';
      status.className = 'search-status';
      status.textContent = '✓ 데이터 로드 완료 — 체급 확인 후 카드 생성';
      status.style.display = 'block';
      redraw();
    })
    .catch(function() {
      status.className = 'search-status error';
      status.textContent = '네트워크 오류가 발생했습니다. 다시 시도해주세요.';
      status.style.display = 'block';
    })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = '검색';
    });
});

// ── 카드 생성 ──
document.getElementById('createBtn').addEventListener('click', function() {
  if (!_currentRawStats || !_currentScores) {
    alert('먼저 선수를 검색해주세요.');
    return;
  }

  var canvas = document.getElementById('canvas');
  var thumb = document.createElement('canvas');
  thumb.width = 88;
  thumb.height = Math.round(88 * canvas.height / canvas.width);
  thumb.getContext('2d').drawImage(canvas, 0, 0, thumb.width, thumb.height);

  var card = {
    id: Date.now().toString(),
    name: document.getElementById('nameInput').value.trim() || 'FIGHTER',
    weight_class: document.getElementById('weightClassSelect').value,
    raw_stats: _currentRawStats,
    scores: _currentScores,
    image: thumb.toDataURL('image/jpeg', 0.82)
  };

  var btn = document.getElementById('createBtn');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  fetch('/api/cards', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(card)
  })
    .then(function(r) { return r.json(); })
    .then(function() {
      btn.textContent = '저장 완료 ✓';
      btn.style.background = '#1a6b1a';
      renderSavedCards();
      setTimeout(function() {
        btn.textContent = '카드 생성';
        btn.style.background = '#d4001a';
        btn.disabled = false;
      }, 1600);
    })
    .catch(function() {
      alert('저장 중 오류가 발생했습니다.');
      btn.textContent = '카드 생성';
      btn.disabled = false;
    });
});

function loadCard(card) {
  document.getElementById('nameInput').value = card.name || '';
  var scores = {
    fightiq: card.score_fightiq, power: card.score_power,
    strikingOffense: card.score_strikingoffense, wrestlingOffense: card.score_wrestlingoffense,
    wrestlingDefense: card.score_wrestlingdefense, strikingDefense: card.score_strikingdefense,
    cardio: card.score_cardio, jiujitsu: card.score_jiujitsu
  };
  STATS.forEach(function(s) {
    var v = scores[s.key];
    if (v !== undefined) {
      s.val = v;
      document.getElementById('n_' + s.key).textContent = v;
    }
  });
  redraw();
  // 카드 패널에서 선택 시 스크롤 불필요 — 제거
}

function renderSavedCards() {
  var list = document.getElementById('cardList');
  list.innerHTML = '<span class="no-cards">불러오는 중...</span>';

  fetch('/api/cards')
    .then(function(r) { return r.json(); })
    .then(function(cards) {
      list.innerHTML = '';
      if (!cards.length) {
        list.innerHTML = '<span class="no-cards">아직 저장된 카드가 없습니다</span>';
        return;
      }
      cards.forEach(function(card) {
        var item = document.createElement('div');
        item.className = 'card-item';
        item.draggable = true;
        item.dataset.id = card.id;
        item.innerHTML =
          '<img src="' + (card.image || '') + '" alt="' + card.name + '">' +
          '<div class="card-name">' + card.name + '</div>' +
          '<button class="card-del" title="삭제">✕</button>';
        item.addEventListener('click', function() { loadCard(card); });
        item.addEventListener('dragstart', function(e) {
          e.dataTransfer.setData('cardId', card.id);
        });
        item.querySelector('.card-del').addEventListener('click', function(e) {
          e.stopPropagation();
          fetch('/api/cards/' + card.id, { method: 'DELETE' })
            .then(function() { renderSavedCards(); });
        });
        list.appendChild(item);
      });
    })
    .catch(function() {
      list.innerHTML = '<span class="no-cards">카드를 불러오지 못했습니다</span>';
    });
}

document.getElementById('saveBtn').addEventListener('click', function() {
  try {
    var canvas = document.getElementById('canvas');
    var dataURL = canvas.toDataURL('image/png');
    var img = document.getElementById('outImg');
    var hint = document.getElementById('hint');
    img.src = dataURL;
    img.style.display = 'block';
    hint.style.display = 'block';
    setTimeout(function() { img.scrollIntoView({behavior:'smooth'}); }, 200);
  } catch(e) { alert('오류: ' + e.message); }
});

function drawOct(ctx, cx, cy, r, fill, stroke, lw) {
  ctx.beginPath();
  for (var i = 0; i < 8; i++) {
    var a = (Math.PI/4)*i - Math.PI/8;
    if (i===0) ctx.moveTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
    else ctx.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
  }
  ctx.closePath();
  if (fill) { ctx.fillStyle=fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=lw; ctx.stroke(); }
}

function draw() {
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;

  ctx.clearRect(0,0,W,H);

  // ── 배경 ──
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0,0,W,H);
  var bgGrad = ctx.createLinearGradient(0,0,W,H);
  bgGrad.addColorStop(0, 'rgba(180,0,20,0.15)');
  bgGrad.addColorStop(0.5, 'rgba(0,0,0,0)');
  bgGrad.addColorStop(1, 'rgba(180,0,20,0.08)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0,0,W,H);

  // ════════════════════════════════
  // 구역 1 : 이름 + 총점  [0 ~ 105]
  // ════════════════════════════════
  var topBar = ctx.createLinearGradient(0,0,W,0);
  topBar.addColorStop(0, '#d4001a');
  topBar.addColorStop(0.5, '#ff1a30');
  topBar.addColorStop(1, '#d4001a');
  ctx.fillStyle = topBar;
  ctx.fillRect(0, 0, W, 5);

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 5, W, 100);

  var name = document.getElementById('nameInput').value || 'FIGHTER';
  var year = document.getElementById('yearInput').value || '';

  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';

  // 이름 — 항상 가운데
  ctx.font = 'bold 42px "Bebas Neue", sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = 'rgba(212,0,26,0.35)';
  ctx.shadowBlur = 8;
  ctx.fillText(name.toUpperCase(), W/2, 38);
  ctx.shadowBlur = 0;

  // 연도 — 같은 row 맨 우측
  if (year) {
    ctx.textAlign = 'right';
    ctx.font = 'bold 18px "Bebas Neue", sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = 'rgba(255,215,0,0.6)';
    ctx.shadowBlur = 8;
    ctx.fillText(year, W - 20, 38);
    ctx.shadowBlur = 0;
  }

  // 총점 — 가운데
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var total = getTotal();
  ctx.font = 'bold 26px "Bebas Neue", sans-serif';

  if (total >= 100) {
    // ★ PERFECT — 레인보우 shimmer
    var pulse = (Math.sin(_animT * 0.004) + 1) * 0.5;
    var hue = (_animT * 0.3) % 360;
    var tg = ctx.createLinearGradient(W/2 - 100, 70, W/2 + 100, 90);
    tg.addColorStop(0,    'hsl(' + hue + ',100%,75%)');
    tg.addColorStop(0.25, 'hsl(' + ((hue+90)%360) + ',100%,85%)');
    tg.addColorStop(0.5,  '#ffffff');
    tg.addColorStop(0.75, 'hsl(' + ((hue+180)%360) + ',100%,80%)');
    tg.addColorStop(1,    'hsl(' + ((hue+270)%360) + ',100%,75%)');
    ctx.fillStyle = tg;
    ctx.shadowColor = 'rgba(255,255,255,' + (0.8 + pulse * 0.2) + ')';
    ctx.shadowBlur = 18 + pulse * 20;
    ctx.fillText('RATING  ' + total, W/2, 80);
    ctx.shadowBlur = 0;
    ctx.save();
    var sparks = [{ox:-95,oy:0},{ox:95,oy:0},{ox:-60,oy:-14},{ox:60,oy:-14},{ox:0,oy:-16},{ox:-78,oy:12},{ox:78,oy:12},{ox:-30,oy:14},{ox:30,oy:14}];
    sparks.forEach(function(sp, idx) {
      var alpha = (Math.sin(_animT * 0.005 + idx * 0.9) + 1) * 0.5;
      var sz = 1.5 + alpha * 2.5;
      ctx.globalAlpha = alpha * 0.9;
      ctx.strokeStyle = 'hsl(' + ((hue + idx*40)%360) + ',100%,80%)';
      ctx.lineWidth = sz * 0.7;
      ctx.shadowColor = ctx.strokeStyle;
      ctx.shadowBlur = 6;
      var sx = W/2 + sp.ox, sy = 80 + sp.oy;
      ctx.beginPath();
      ctx.moveTo(sx, sy - sz*2); ctx.lineTo(sx, sy + sz*2);
      ctx.moveTo(sx - sz*2, sy); ctx.lineTo(sx + sz*2, sy);
      ctx.stroke();
    });
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    ctx.restore();
  } else if (total >= 90) {
    // ◆ ELITE — 다이아 shimmer (cyan)
    var pulse = (Math.sin(_animT * 0.004) + 1) * 0.5;
    var tg = ctx.createLinearGradient(W/2 - 90, 70, W/2 + 90, 90);
    var shift = (Math.sin(_animT * 0.003) + 1) * 0.5;
    tg.addColorStop(0,                          '#a8edff');
    tg.addColorStop(Math.max(0, shift - 0.1),   '#a8edff');
    tg.addColorStop(shift,                       '#ffffff');
    tg.addColorStop(Math.min(1, shift + 0.1),   '#c8f4ff');
    tg.addColorStop(1,                          '#a8edff');
    ctx.fillStyle = tg;
    ctx.shadowColor = 'rgba(160,235,255,' + (0.7 + pulse * 0.3) + ')';
    ctx.shadowBlur = 12 + pulse * 16;
    ctx.fillText('RATING  ' + total, W/2, 80);
    ctx.shadowBlur = 0;
    ctx.save();
    var sparks = [{ox:-95,oy:0},{ox:95,oy:0},{ox:-60,oy:-14},{ox:60,oy:-14},{ox:0,oy:-16},{ox:-78,oy:12},{ox:78,oy:12}];
    sparks.forEach(function(sp, idx) {
      var alpha = (Math.sin(_animT * 0.005 + idx * 1.1) + 1) * 0.5;
      var sz = 1.5 + alpha * 2;
      ctx.globalAlpha = alpha * 0.85;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = sz * 0.7;
      ctx.shadowColor = '#a8edff';
      ctx.shadowBlur = 6;
      var sx = W/2 + sp.ox, sy = 80 + sp.oy;
      ctx.beginPath();
      ctx.moveTo(sx, sy - sz*2); ctx.lineTo(sx, sy + sz*2);
      ctx.moveTo(sx - sz*2, sy); ctx.lineTo(sx + sz*2, sy);
      ctx.stroke();
    });
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    ctx.restore();
  } else if (total >= 80) {
    // ● GREAT — 레드 글로우
    ctx.fillStyle = '#ff3344';
    ctx.shadowColor = 'rgba(255,51,68,0.7)';
    ctx.shadowBlur = 12;
    ctx.fillText('RATING  ' + total, W/2, 80);
    ctx.shadowBlur = 0;
  } else if (total >= 70) {
    // ● GOOD — 골드
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = 'rgba(255,215,0,0.6)';
    ctx.shadowBlur = 9;
    ctx.fillText('RATING  ' + total, W/2, 80);
    ctx.shadowBlur = 0;
  } else if (total >= 60) {
    // ● AVERAGE — 소프트 블루
    ctx.fillStyle = '#66bbee';
    ctx.shadowColor = 'rgba(100,180,240,0.5)';
    ctx.shadowBlur = 6;
    ctx.fillText('RATING  ' + total, W/2, 80);
    ctx.shadowBlur = 0;
  } else {
    // ● LOW — 그레이
    ctx.fillStyle = '#777777';
    ctx.shadowBlur = 0;
    ctx.fillText('RATING  ' + total, W/2, 80);
  }

  // ════════════════════════════════
  // 구역 2 : 레이더 차트  [105 ~ 490]
  // ════════════════════════════════
  // 차트 중심을 충분히 내리고 maxR 줄여서 라벨이 위아래 구역과 안 겹치게
  var cx = W/2, cy = 308, maxR = 118;
  var labelR = maxR + 44; // 라벨 위치

  // 배경 옥타곤 워터마크
  ctx.save();
  ctx.globalAlpha = 0.03;
  drawOct(ctx, cx, cy, 200, '#ffffff', null, 0);
  ctx.globalAlpha = 1;
  ctx.restore();

  // 가이드 링
  for (var ring = 1; ring <= 5; ring++) {
    drawOct(ctx, cx, cy, maxR/5*ring, 'rgba(255,255,255,0.02)', 'rgba(255,255,255,0.07)', 0.5);
  }

  // 외곽 테두리
  ctx.save();
  ctx.shadowColor = 'rgba(212,0,26,0.5)';
  ctx.shadowBlur = 14;
  drawOct(ctx, cx, cy, maxR+14, null, '#d4001a', 2);
  ctx.restore();
  drawOct(ctx, cx, cy, maxR+26, null, 'rgba(212,0,26,0.15)', 1);

  // 축 라인
  ANGLES.forEach(function(deg) {
    var rad = toRad(deg);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(rad)*maxR, cy + Math.sin(rad)*maxR);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // 데이터 폴리곤 (비선형 스케일)
  var pts = STATS.map(function(s, i) {
    var rad = toRad(ANGLES[i]);
    return {x: cx + Math.cos(rad)*curveR(s.val)*maxR, y: cy + Math.sin(rad)*curveR(s.val)*maxR};
  });

  var grad = ctx.createRadialGradient(cx, cy-20, 0, cx, cy, maxR);
  grad.addColorStop(0,   'rgba(255,80,80,0.85)');
  grad.addColorStop(0.5, 'rgba(200,0,20,0.7)');
  grad.addColorStop(1,   'rgba(100,0,10,0.5)');

  ctx.beginPath();
  pts.forEach(function(p,i){ if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); });
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.save();
  ctx.shadowColor = '#ff1a30';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  pts.forEach(function(p,i){ if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); });
  ctx.closePath();
  ctx.strokeStyle = '#ff3344';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.shadowColor = '#ff1a30';
  ctx.shadowBlur = 10;
  pts.forEach(function(p) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
  });
  ctx.restore();

  ctx.shadowBlur = 0;
  ctx.textBaseline = 'middle';
  STATS.forEach(function(s, i) {
    var rad = toRad(ANGLES[i]);
    ctx.font = '700 12px "Barlow Condensed", sans-serif';
    ctx.fillStyle = '#cccccc';
    ctx.textAlign = 'center';
    ctx.fillText(s.label.toUpperCase(), cx + Math.cos(rad)*labelR, cy + Math.sin(rad)*labelR);
  });

  // ════════════════════════════════
  // 구역 3 : 2열 압축 테이블
  // ════════════════════════════════
  var allStats = STATS.concat(EXTRA);
  var tY = 482;
  var colW = (W - 60) / 2;  // 2열
  var rowH = 22;
  var hdrH = 28;
  var rows = Math.ceil(allStats.length / 2);
  var tH = hdrH + rows * rowH;

  // 테이블 전체 배경
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(20, tY, W-40, tH);
  ctx.strokeStyle = 'rgba(212,0,26,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(20, tY, W-40, tH);

  // 헤더
  var hGrad = ctx.createLinearGradient(20,0,W-20,0);
  hGrad.addColorStop(0, '#d4001a'); hGrad.addColorStop(1, '#8a0010');
  ctx.fillStyle = hGrad;
  ctx.fillRect(20, tY, W-40, hdrH);

  ctx.font = 'bold 12px "Bebas Neue", sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // 왼쪽 열 헤더
  ctx.fillText('STAT', 20 + colW*0.38, tY + hdrH/2);
  ctx.fillText('SCORE', 20 + colW*0.78, tY + hdrH/2);
  // 오른쪽 열 헤더
  ctx.fillText('STAT', 20 + colW + colW*0.38, tY + hdrH/2);
  ctx.fillText('SCORE', 20 + colW + colW*0.78, tY + hdrH/2);

  // 가운데 세로 구분선
  ctx.strokeStyle = 'rgba(212,0,26,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(20 + colW, tY);
  ctx.lineTo(20 + colW, tY + tH);
  ctx.stroke();

  // 각 열 안의 스코어 세로선
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 0.5;
  [20 + colW*0.6, 20 + colW + colW*0.6].forEach(function(lx) {
    ctx.beginPath(); ctx.moveTo(lx, tY); ctx.lineTo(lx, tY+tH); ctx.stroke();
  });

  // 데이터
  allStats.forEach(function(s, i) {
    var col = i % 2;
    var row = Math.floor(i / 2);
    var rx = 20 + col * colW;
    var ry = tY + hdrH + row * rowH;
    var isExtra = i >= STATS.length;

    ctx.fillStyle = isExtra ? 'rgba(212,0,26,0.08)' : (row%2===0 ? 'rgba(255,255,255,0.03)' : 'transparent');
    ctx.fillRect(rx + (col===0?1:0), ry, colW - (col===1?1:0), rowH);

    ctx.font = '700 12px "Barlow Condensed", sans-serif';
    ctx.fillStyle = isExtra ? '#ffaaaa' : '#bbbbbb';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(s.label.toUpperCase(), rx + colW*0.38, ry + rowH/2);

    ctx.font = 'bold 13px "Bebas Neue", sans-serif';
    ctx.fillStyle = s.val >= 9 ? '#ffd700' : s.val >= 7 ? '#ffffff' : '#888888';
    ctx.fillText(s.val, rx + colW*0.78, ry + rowH/2);
  });

  // 하단 바
  ctx.fillStyle = '#d4001a';
  ctx.fillRect(0, H-5, W, 5);

  // 워터마크
  ctx.font = '700 10px "Barlow Condensed", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('STATS v1.0', W-16, H-10);
}

function redraw() {
  if (getTotal() >= 90) {
    if (!_animId) {
      (function loop(t) {
        _animT = t;
        draw();
        if (getTotal() >= 90) _animId = requestAnimationFrame(loop);
        else { _animId = null; draw(); }
      })(_animT);
    }
  } else {
    if (_animId) { cancelAnimationFrame(_animId); _animId = null; }
    draw();
  }
}

// ── DB 일괄 생성 ──
document.getElementById('bulkBtn').addEventListener('click', function() {
  if (!confirm('DB에 저장된 선수 전체의 카드를 생성합니다.\n이미 같은 이름의 카드가 있으면 건너뜁니다.\n계속할까요?')) return;

  var bulkBtn = document.getElementById('bulkBtn');
  var progress = document.getElementById('bulkProgress');
  var barFill = document.getElementById('bulkBarFill');
  var statusText = document.getElementById('bulkStatusText');

  bulkBtn.disabled = true;
  progress.style.display = 'block';
  statusText.textContent = '선수 목록 불러오는 중...';

  // 애니메이션 루프 중단
  if (_animId) { cancelAnimationFrame(_animId); _animId = null; }

  var allFighters = [];
  var existingNames = new Set();
  var done = 0, skipped = 0, failed = 0;

  function updateBar(current, total) {
    var pct = total > 0 ? Math.round(current / total * 100) : 0;
    barFill.style.width = pct + '%';
    statusText.textContent = current + ' / ' + total + ' 완료' +
      (skipped > 0 ? ' · ' + skipped + ' 스킵' : '') +
      (failed > 0 ? ' · ' + failed + ' 실패' : '');
  }

  function makeCard(fighter, data) {
    // STATS 값 설정
    var keyMap = {
      fightiq:'fightiq', power:'power',
      strikingOffense:'strikingOffense', wrestlingOffense:'wrestlingOffense',
      wrestlingDefense:'wrestlingDefense', strikingDefense:'strikingDefense',
      cardio:'cardio', jiujitsu:'jiujitsu'
    };
    STATS.forEach(function(s) {
      var v = data.scores ? data.scores[keyMap[s.key]] : undefined;
      s.val = (v !== undefined) ? v : 5;
      document.getElementById('n_' + s.key).textContent = s.val;
    });

    // 이름·체급 설정
    document.getElementById('nameInput').value = fighter.name || fighter.slug;
    var sel = document.getElementById('weightClassSelect');
    var wc = data.weightClass || fighter.weight_class || '';
    for (var i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === wc) { sel.selectedIndex = i; break; }
    }

    // Canvas 렌더링
    draw();

    // 썸네일 생성
    var canvas = document.getElementById('canvas');
    var thumb = document.createElement('canvas');
    thumb.width = 88;
    thumb.height = Math.round(88 * canvas.height / canvas.width);
    thumb.getContext('2d').drawImage(canvas, 0, 0, thumb.width, thumb.height);

    return {
      id: Date.now().toString() + '_' + done,
      name: fighter.name || fighter.slug,
      weight_class: wc,
      raw_stats: data.raw || null,
      scores: data.scores || null,
      image: thumb.toDataURL('image/jpeg', 0.82)
    };
  }

  function delay(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

  async function runBulk() {
    // 1) DB 선수 목록
    var fighters = await fetch('/api/ufc-fighters').then(function(r) { return r.json(); });
    // 2) 기존 카드 목록
    var cards = await fetch('/api/cards').then(function(r) { return r.json(); });
    cards.forEach(function(c) { existingNames.add(c.name.toLowerCase()); });

    var toGen = fighters.filter(function(f) {
      return !existingNames.has((f.name || '').toLowerCase());
    });
    skipped = fighters.length - toGen.length;

    statusText.textContent = toGen.length + '명 생성 시작 (' + skipped + '명 스킵)...';
    updateBar(0, toGen.length);

    for (var i = 0; i < toGen.length; i++) {
      var fighter = toGen[i];
      statusText.textContent = '(' + (i+1) + '/' + toGen.length + ') ' + (fighter.name || fighter.slug) + ' 처리 중...';
      try {
        var res = await fetch('/api/ufc-fighters/' + encodeURIComponent(fighter.slug));
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'failed');

        var card = makeCard(fighter, data);

        var saveRes = await fetch('/api/cards', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(card)
        });
        if (!saveRes.ok) throw new Error('save failed');

        done++;
      } catch(e) {
        failed++;
      }
      updateBar(done + failed, toGen.length);
      await delay(120); // 서버 부하 방지
    }

    // 완료
    statusText.textContent = '완료! ' + done + '명 생성' +
      (skipped > 0 ? ' · ' + skipped + '명 스킵' : '') +
      (failed > 0 ? ' · ' + failed + '명 실패' : '');
    barFill.style.background = '#1a6b1a';
    bulkBtn.disabled = false;
    renderSavedCards();
    redraw();
  }

  runBulk().catch(function(e) {
    statusText.textContent = '오류: ' + e.message;
    bulkBtn.disabled = false;
  });
});

window.onload = function() {
  redraw();
  renderSavedCards();
};
</script>
